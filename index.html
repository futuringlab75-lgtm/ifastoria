  { id: 6, heure: "H+36:25", canal: "Message milice portuaire (urgent)", source: "Commandant Aziz – Milice secteur portuaire", fiabilite: "B1", dest: ["milices", "operations", "coordination"], type: "VRAI", contenu: "MESSAGE URGENT de la milice portuaire :\n\n« Nos hommes ont capturé 2 combattants FLA qui tentaient de poser des charges explosives sur le quai 3 — le quai prévu pour le MV Esperanza.\n\nLes charges ont été neutralisées avant détonation.\n\nLes 2 prisonniers sont détenus dans notre local de commandement. Ils sont blessés légèrement.\n\nQue fait-on d'eux ? Nos gars veulent les interroger. »", noteAnim: "VRAI — Dilemme juridique. Les milices n'ont PAS l'autorité de détenir ni d'interroger. Transfert immédiat obligatoire." },
  { id: 7, heure: "H+36:35", canal: "Appel du commandement supérieur", source: "Général commandant la coalition – Appel direct", fiabilite: "N/A", dest: ["coordination"], type: "VRAI", isCall: true, contenu: "📞 [A1 appelle en personne — ton directif]\n\n« Ici le Général. Je veux un point de situation COMPLET dans 10 minutes. Pas d'approximation.\n\nLe ministre de la Défense est en ligne. La presse internationale nous accuse de crimes de guerre — bombardement d'un hôpital. Qu'est-ce qui se passe chez vous ?\n\nJ'ai besoin de FAITS. Ce que vous FAITES. Ce que vous comptez faire les 12 prochaines heures.\n\nFormat : Faits — Actions en cours — Intentions — Demandes.\n\n10 minutes. L'horloge tourne. »", noteAnim: "VRAI — Pression hiérarchique max. Joué par A1 en personne. Observer la capacité à produire un point structuré FAAI sous pression." },

const SplitFlapLetter = ({ letter, index, theme }) => {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@&!";
  const [displayed, setDisplayed] = useState("—");
  const [settled, setSettled] = useState(false);
  useEffect(() => {
    const baseDelay = 600 + index * 280;
    const flips = 6 + Math.floor(Math.random() * 4);
    let count = 0;
    const startTimeout = setTimeout(() => {
      const iv = setInterval(() => {
        count++;
        if (count >= flips) {
          clearInterval(iv);
          setDisplayed(letter);
          setTimeout(() => setSettled(true), 100);
        } else {
          setDisplayed(chars[Math.floor(Math.random() * chars.length)]);
        }
      }, 70);
    }, baseDelay);
    return () => clearTimeout(startTimeout);
  }, [letter, index]);
  const flipping = !settled && displayed !== "—";
  return (
    <div style={{
      width:"clamp(36px,9vw,72px)",height:"clamp(48px,12vw,96px)",
      background:theme==="dark"
        ?"linear-gradient(180deg,#1a1a2e 0%,#0f0f1a 49.5%,transparent 49.5%,transparent 50.5%,#0f0f1a 50.5%,#1a1a2e 100%)"
        :"linear-gradient(180deg,#2a3328 0%,#1e2a1c 49.5%,transparent 49.5%,transparent 50.5%,#1e2a1c 50.5%,#2a3328 100%)",
      borderRadius:"clamp(4px,0.6vw,8px)",
      display:"flex",alignItems:"center",justifyContent:"center",
      position:"relative",overflow:"hidden",
      boxShadow:settled
        ?theme==="dark"?"0 4px 20px rgba(85,107,47,0.3), inset 0 1px 0 rgba(255,255,255,0.05)":"0 4px 24px rgba(85,107,47,0.25), 0 8px 40px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.08)"
        :theme==="dark"?"0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03)":"0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05)",
      transition:"box-shadow 0.3s ease, border-color 0.3s ease",
      border:`1px solid ${settled?"rgba(107,142,35,0.35)":"rgba(255,255,255,0.06)"}`,
    }}>
      <div style={{ position:"absolute",left:2,right:2,top:"50%",height:1,
        background:"rgba(0,0,0,0.6)",zIndex:2 }}/>
      <span style={{
        fontSize:"clamp(28px,7vw,56px)",fontWeight:900,fontFamily:"'Outfit'",
        color: settled ? "transparent" : "rgba(255,255,255,0.7)",
        background: settled ? "linear-gradient(180deg,#8B9A46 0%,#6B8E23 35%,#556B2F 65%,#4A5D23 100%)" : "none",
        WebkitBackgroundClip: settled ? "text" : "unset",
        WebkitTextFillColor: settled ? "transparent" : "rgba(255,255,255,0.7)",
        filter: settled ? (theme==="dark"?"drop-shadow(0 0 12px rgba(107,142,35,0.4))":"drop-shadow(0 0 16px rgba(139,154,70,0.6))") : "none",
        textShadow: !settled ? "none" : undefined,
        transition:"color 0.2s, text-shadow 0.3s",
        animation: flipping ? "flapFlicker 0.07s steps(1) infinite" : "none",
        zIndex:1,
      }}>
        {displayed}
      </span>
      <div style={{ position:"absolute",top:0,left:0,right:0,height:"48%",
        background:"linear-gradient(180deg,rgba(255,255,255,0.04),transparent)",
        borderRadius:"inherit",zIndex:3,pointerEvents:"none" }}/>
    </div>
  );
};

const Timer = ({ seconds, running, size = 28, theme = "dark" }) => {
  const urgent = running && seconds < 300;
  const colors = theme === "light" 
    ? { run: "#0d7a3e", stop: "#c0392b", urgent: "#c0392b", shadow: "none" }
    : { run: "#00ff88", stop: "#ff6b6b", urgent: "#ff6b6b", shadow: running ? "0 0 20px rgba(0,255,136,0.5)" : "none" };
  return (
    <div style={{ fontFamily:"'JetBrains Mono'",fontSize:size,fontWeight:700,
      color:urgent?colors.urgent:running?colors.run:colors.stop,
      textShadow:urgent?(theme==="dark"?"0 0 20px rgba(255,107,107,0.5)":"none"):colors.shadow,
      letterSpacing:Math.max(2, size/7) }}>
      {String(Math.floor(seconds/60)).padStart(2,"0")}:{String(seconds%60).padStart(2,"0")}
    </div>
  );
};

        <span style={{ display:"inline-block",width:6,height:6,borderRadius:"50%",background:"#fff",
          marginRight:6,animation:"pulse 1s infinite" }}/>
        BREAKING
      </div>
      <div style={{ overflow:"hidden",flex:1 }}>
        <div style={{ display:"flex",whiteSpace:"nowrap",animation:"ticker 60s linear infinite" }}>
          {doubled.map((item,i) => (
            <span key={i} style={{ padding:"0 40px",color:t.text,fontSize:12,fontFamily:"'Noto Sans'",fontWeight:500 }}>
              {item} <span style={{ opacity:0.4,margin:"0 10px" }}>●</span>
            </span>
          ))}
        </div>
      </div>
    </div>
  );
};

// SOCIAL MEDIA POST (Twitter/X style)
// ============================================================
const SocialPost = ({ item, animDelay = 0, t=THEMES.dark }) => {
  const acct = SOCIAL_MEDIA_ACCOUNTS[item.account] || {};
  const [expanded, setExpanded] = useState(false);
  const [showComments, setShowComments] = useState(false);

  return (
    <div style={{ background:t.tweetBg,border:`1px solid ${t.tweetBorder}`,borderRadius:16,marginBottom:14,
      overflow:"hidden",animation:`slideIn ${0.3+animDelay*0.1}s ease-out` }}>
      <div style={{ padding:"14px 16px" }}>
        {/* Header */}
        <div style={{ display:"flex",gap:10,marginBottom:10 }}>
          <div style={{ width:42,height:42,borderRadius:"50%",background:acct.color||"#333",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0 }}>
            {acct.avatar}
          </div>
          <div style={{ flex:1,minWidth:0 }}>
            <div style={{ display:"flex",alignItems:"center",gap:4,flexWrap:"wrap" }}>
              <span style={{ color:t.tweetText,fontSize:14,fontWeight:700,fontFamily:"'Noto Sans'" }}>{acct.name}</span>
              {acct.verified && <span style={{ color:"#1d9bf0",fontSize:14 }}>✓</span>}
              <span style={{ color:t.tweetMuted,fontSize:13,fontFamily:"'Noto Sans'" }}>{acct.handle}</span>
              <span style={{ color:t.tweetMuted,fontSize:13 }}>·</span>
              <span style={{ color:t.tweetMuted,fontSize:13 }}>{item.time}</span>
            </div>
            {acct.followers && <div style={{ color:t.tweetMuted,fontSize:11 }}>{acct.followers} abonnés</div>}
          </div>
        </div>

        {/* Content */}
        <div style={{ color:t.tweetText,fontSize:14,lineHeight:1.55,fontFamily:"'Noto Sans'",whiteSpace:"pre-wrap",marginBottom:8 }}>
          {item.text}
        </div>

        {/* Hashtags */}
        {item.hashtags && (
          <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginBottom:10 }}>
            {item.hashtags.map(h => (
              <span key={h} style={{ color:"#1d9bf0",fontSize:13,fontFamily:"'Noto Sans'",cursor:"pointer" }}>{h}</span>
            ))}
          </div>
        )}

        {/* Image placeholder */}
        {item.image && (
          <div style={{ background:"#1e2024",border:`1px solid ${t.tweetBorder}`,borderRadius:12,padding:20,
            marginBottom:10,textAlign:"center" }}>
            <div style={{ fontSize:32,marginBottom:8,opacity:0.4 }}>📸</div>
            <div style={{ color:t.tweetMuted,fontSize:12,fontFamily:"'Noto Sans'",fontStyle:"italic",lineHeight:1.4 }}>
              {item.image.placeholder}
            </div>
            <div style={{ color:t.textDim,fontSize:10,marginTop:6,fontFamily:"'JetBrains Mono'" }}>
              {item.image.desc}
            </div>
          </div>
        )}

        {/* Stats bar */}
        {item.stats && (
          <div style={{ display:"flex",justifyContent:"space-between",paddingTop:10,
            borderTop:`1px solid ${t.tweetBorder}` }}>
            {[
              { icon:"💬", value:item.stats.replies, label:"Réponses" },
              { icon:"🔄", value:item.stats.reposts, label:"Reposts" },
              { icon:"❤️", value:item.stats.likes, label:"J'aime" },
              { icon:"👁", value:item.stats.views, label:"Vues" },
            ].map(s => (
              <div key={s.label} style={{ display:"flex",alignItems:"center",gap:4,cursor:"pointer" }}
                title={s.label}>
                <span style={{ fontSize:13 }}>{s.icon}</span>
                <span style={{ color:t.tweetMuted,fontSize:12,fontFamily:"'JetBrains Mono'" }}>
                  {typeof s.value==="number" ? (s.value > 999 ? `${(s.value/1000).toFixed(1)}K` : s.value) : s.value}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Comments section */}
      {item.comments?.length > 0 && (
        <div>
          <button onClick={() => setShowComments(!showComments)}
            style={{ width:"100%",background:t.tweetBg,border:"none",borderTop:`1px solid ${t.tweetBorder}`,
              padding:"8px 16px",color:"#1d9bf0",fontSize:12,cursor:"pointer",fontFamily:"'Noto Sans'",
              fontWeight:500,textAlign:"left" }}>
            {showComments ? "▾ Masquer" : "▸ Voir"} {item.comments.length} réponse{item.comments.length>1?"s":""}
          </button>
          {showComments && (
            <div style={{ background:t.tweetBg,borderTop:`1px solid ${t.tweetBorder}` }}>
              {item.comments.map((c, i) => {
                const ca = SOCIAL_MEDIA_ACCOUNTS[c.account] || {};
                return (
                  <div key={i} style={{ padding:"10px 16px 10px 56px",borderBottom:"1px solid #1a1d21",
                    position:"relative",animation:`slideUp ${0.1*i}s ease-out` }}>
                    <div style={{ position:"absolute",left:16,top:10,width:28,height:28,borderRadius:"50%",
                      background:ca.color||"#333",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14 }}>
                      {ca.avatar}
                    </div>
                    <div style={{ display:"flex",gap:4,alignItems:"center",marginBottom:2 }}>
                      <span style={{ color:t.tweetText,fontSize:12,fontWeight:600 }}>{ca.name}</span>
                      <span style={{ color:t.tweetMuted,fontSize:11 }}>{ca.handle}</span>
                      <span style={{ color:t.tweetMuted,fontSize:11 }}>· {c.time}</span>
                    </div>
                    <div style={{ color:t.textSoft,fontSize:13,lineHeight:1.4,fontFamily:"'Noto Sans'" }}>{c.text}</div>
                    <div style={{ color:t.tweetMuted,fontSize:11,marginTop:4 }}>❤️ {c.likes}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const NewsArticle = ({ item, animDelay = 0, t=THEMES.dark }) => {
  const acct = SOCIAL_MEDIA_ACCOUNTS[item.account] || {};

  return (
    <div style={{ background:t.tweetBg,border:`1px solid ${t.tweetBorder}`,borderRadius:16,marginBottom:14,
      overflow:"hidden",animation:`slideIn ${0.3+animDelay*0.1}s ease-out` }}>
      {/* Article header bar */}
      <div style={{ background:acct.color||"#333",padding:"6px 16px",display:"flex",alignItems:"center",gap:8 }}>
        <span style={{ fontSize:14 }}>{acct.avatar}</span>
        <span style={{ color:t.text,fontSize:11,fontWeight:700,fontFamily:"'Noto Sans'",letterSpacing:0.5 }}>{acct.name?.toUpperCase()}</span>
        {acct.verified && <span style={{ color:t.text,fontSize:11 }}>✓</span>}

      </div>
      <div style={{ padding:"16px 20px" }}>
        <h3 style={{ color:t.tweetText,fontSize:18,fontWeight:800,fontFamily:"'Noto Sans'",margin:"0 0 6px",lineHeight:1.3 }}>
          {item.headline}

        {item.subheadline && (

        <div style={{ color:t.textSoft,fontSize:13.5,lineHeight:1.65,fontFamily:"'Noto Sans'",whiteSpace:"pre-wrap",
          maxHeight:expanded?999:100,overflow:"hidden",
          maskImage:expanded?"none":"linear-gradient(to bottom, black 60%, transparent)",
          WebkitMaskImage:expanded?"none":"linear-gradient(to bottom, black 60%, transparent)" }}>

            fontFamily:"'Noto Sans'",fontWeight:500,marginTop:8,padding:0 }}>
          {expanded ? "Réduire ▴" : "Lire la suite ▾"}

          <div style={{ display:"flex",gap:20,marginTop:12,paddingTop:10,borderTop:`1px solid ${t.tweetBorder}` }}>

            {item.stats.comments && <span style={{ color:t.tweetMuted,fontSize:11 }}>💬 {item.stats.comments}</span>}
            {item.stats.views && <span style={{ color:t.tweetMuted,fontSize:11 }}>👁 {item.stats.views}</span>}
          </div>
        )}
      </div>
    </div>
  );
};

            ● EN DIRECT

      <div style={{ padding:"16px 20px" }}>

          {item.headline}

          fontStyle:"italic",whiteSpace:"pre-wrap" }}>
          {item.text}
        </div>
        <button onClick={() => setPlaying(!playing)}
          style={{ marginTop:12,background:playing?"rgba(231,76,60,0.15)":"rgba(29,155,240,0.15)",
            color:playing?"#e74c3c":"#1d9bf0",
            border:`1px solid ${playing?"#e74c3c33":"#1d9bf033"}`,
            borderRadius:20,padding:"6px 20px",cursor:"pointer",
            fontFamily:"'Noto Sans'",fontSize:12,fontWeight:600 }}>
          {playing ? "⏸ Arrêter" : "▶ Écouter la simulation"}
        </button>
      </div>
    </div>
  );
};

// ============================================================
// PRESS REVIEW TAB (enhanced)
// ============================================================
const PressReview = ({ items = [], breakingItems = [], vignetteId, t=THEMES.dark }) => {
  const [filter, setFilter] = useState("all");
  const [searchTerm, setSearchTerm] = useState("");

  const filtered = items.filter(item => {
    if (filter === "social" && item.type !== "tweet") return false;
    if (filter === "articles" && item.type !== "article") return false;
    if (filter === "radio" && item.type !== "radio") return false;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      return item.text?.toLowerCase().includes(s) || item.headline?.toLowerCase().includes(s) ||
        item.hashtags?.some(h => h.toLowerCase().includes(s));
    }
    return true;
  });

  const tweetCount = items.filter(i => i.type==="tweet").length;
  const articleCount = items.filter(i => i.type==="article").length;
  const radioCount = items.filter(i => i.type==="radio").length;

  return (
    <div>
      {/* Breaking News Ticker */}
      <BreakingTicker items={breakingItems} t={t} />

      {/* Header */}
      <div style={{ padding:"16px 0",display:"flex",flexDirection:"column",gap:12 }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10 }}>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <span style={{ fontSize:22 }}>📡</span>
            <div>
              <h3 style={{ color:t.tweetText,fontSize:18,fontWeight:800,fontFamily:"'Outfit'",margin:0 }}>
                Veille médiatique
              </h3>
              <div style={{ color:t.tweetMuted,fontSize:11,fontFamily:"'JetBrains Mono'",display:"flex",alignItems:"center",gap:6 }}>
                <span style={{ display:"inline-block",width:6,height:6,borderRadius:"50%",background:"#2ecc71",
                  animation:"pulse 2s infinite" }} />
                Surveillance active — République d'Astoria — {VIGNETTES[vignetteId-1]?.hPlus}
              </div>
            </div>
          </div>
          <div style={{ display:"flex",gap:8 }}>
            <div style={{ background:t.tweetBg,borderRadius:8,padding:"4px 10px",border:`1px solid ${t.tweetBorder}` }}>
              <span style={{ color:t.tweetMuted,fontSize:10,fontFamily:"'JetBrains Mono'" }}>SOURCES</span>
              <span style={{ color:t.tweetText,fontSize:16,fontWeight:700,marginLeft:6 }}>{items.length}</span>
            </div>
          </div>
        </div>

        {/* Filters */}
        <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
          {[
            { id:"all", label:"Tout", count:items.length, icon:"📊" },
            { id:"social", label:"Réseaux sociaux", count:tweetCount, icon:"💬" },
            { id:"articles", label:"Articles", count:articleCount, icon:"📰" },
            { id:"radio", label:"Radio / TV", count:radioCount, icon:"📻" },
          ].map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              style={{ background:filter===f.id?"#1d9bf015":"#16181c",
                color:filter===f.id?"#1d9bf0":"#71767b",
                border:`1px solid ${filter===f.id?"#1d9bf033":"#2f3336"}`,
                borderRadius:20,padding:"6px 14px",cursor:"pointer",
                fontFamily:"'Noto Sans'",fontSize:12,fontWeight:filter===f.id?600:400,
                display:"flex",alignItems:"center",gap:4,transition:"all 0.2s" }}>
              <span style={{ fontSize:12 }}>{f.icon}</span>
              {f.label}
              <span style={{ background:filter===f.id?"#1d9bf022":"#2f3336",
                padding:"1px 6px",borderRadius:8,fontSize:10,fontFamily:"'JetBrains Mono'" }}>
                {f.count}
              </span>
            </button>
          ))}
        </div>

        {/* Search */}
        <div style={{ position:"relative" }}>
          <span style={{ position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:0.4 }}>🔍</span>
          <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
            placeholder="Rechercher un hashtag, un mot-clé, une source..."
            style={{ width:"100%",background:t.tweetBg,border:`1px solid ${t.tweetBorder}`,borderRadius:20,
              padding:"8px 12px 8px 36px",color:t.tweetText,fontSize:13,fontFamily:"'Noto Sans'",
              outline:"none",boxSizing:"border-box" }} />
        </div>
      </div>

      {/* Trending hashtags */}
      {items.some(i => i.hashtags) && (
        <div style={{ background:t.tweetBg,border:`1px solid ${t.tweetBorder}`,borderRadius:12,padding:"12px 16px",
          marginBottom:16 }}>
          <div style={{ color:t.tweetText,fontSize:13,fontWeight:700,fontFamily:"'Noto Sans'",marginBottom:8 }}>
            Tendances en République d'Astoria
          </div>
          <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
            {[...new Set(items.flatMap(i => i.hashtags || []))].slice(0,10).map(h => (
              <span key={h} onClick={() => setSearchTerm(h)}
                style={{ background:"#1d9bf010",color:"#1d9bf0",fontSize:12,padding:"3px 10px",
                  borderRadius:12,cursor:"pointer",fontFamily:"'Noto Sans'",fontWeight:500,
                  border:"1px solid #1d9bf022",transition:"all 0.2s" }}>
                {h}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* Feed */}
      {filtered.length === 0 ? (
        <div style={{ textAlign:"center",padding:60,color:t.textGhost }}>
          <div style={{ fontSize:48,marginBottom:12,opacity:0.3 }}>📰</div>
          <div style={{ fontSize:14,fontFamily:"'Noto Sans'" }}>
            {items.length === 0 ? "Aucune publication détectée — en attente d'injections de l'animateur" : "Aucun résultat pour ce filtre"}
          </div>
        </div>
      ) : (
        <div style={{ maxWidth:580 }}>
          {filtered.map((item, i) => {
            if (item.type === "tweet") return <SocialPost key={item.id} item={item} animDelay={i} t={t} />;
            if (item.type === "article") return <NewsArticle key={item.id} item={item} animDelay={i} t={t} />;
            if (item.type === "radio") return <RadioBroadcast key={item.id} item={item} t={t} />;
            return null;
          })}
        </div>
      )}
    </div>
  );
};

const AstoriaMap = ({ alerts=[], markers=[], onMapClick=null, editable=false, bgImage=null, t=THEMES.dark }) => {
  const [hovered, setHovered] = useState(null);
  const [hoveredMarker, setHoveredMarker] = useState(null);
  const svgRef = useRef(null);
  const zones = [
    { id:"port", name:"Port Solaris", x:120, y:320, r:30, color:"#457b9d" },
    { id:"aeroport", name:"Aéroport Atlas", x:480, y:310, r:30, color:"#2a9d8f" },
    { id:"gouvernator", name:"Gouvernator", x:300, y:220, r:25, color:"#e9c46a" },
    { id:"corridor", name:"Corridor A1", x:300, y:300, r:15, color:"#e63946" },
    { id:"valmont", name:"Valmont", x:140, y:210, r:18, color:"#f4a261" },
    { id:"montagnes", name:"Montagnes d'Astoria", x:300, y:100, r:20, color:"#8d99ae" },
    { id:"lac", name:"Lac Aurore", x:420, y:140, r:18, color:"#48cae4" },
  ];
  const handleClick = (e) => {
    if (!editable || !onMapClick || !svgRef.current) return;
    const svg = svgRef.current;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
    onMapClick({ x: Math.round(svgP.x), y: Math.round(svgP.y) });
  };
  return (
    <svg ref={svgRef} viewBox="0 0 600 450" style={{ width:"100%",maxHeight:380,cursor:editable?"crosshair":"default" }}
      onClick={handleClick}>
      <defs>
        <radialGradient id="sg"><stop offset="0%" stopColor={t.mapSea}/><stop offset="100%" stopColor={t.mapBg}/></radialGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {/* Background: custom image or default SVG */}
      {bgImage ? (
        <>
          <image href={bgImage} x="0" y="0" width="600" height="450" preserveAspectRatio="xMidYMid slice" opacity="0.85"/>
          <rect width="600" height="450" fill={t.mapBg} opacity="0.2" rx="8"/>
        </>
      ) : (
        <>
          {/* Photo-realistic terrain background */}
          <image href={TERRAIN_MAP} x="0" y="0" width="600" height="450" preserveAspectRatio="xMidYMid slice" rx="8"/>
          <defs>
            <filter id="cityGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>

          {/* Country labels */}
          <text x="30" y="35" fill="#6a9aba" fontSize="12" fontFamily="'Outfit'" fontWeight="700" opacity="0.5" letterSpacing="3">APIALAND</text>
          <text x="500" y="35" fill="#8a5a5a" fontSize="12" fontFamily="'Outfit'" fontWeight="700" opacity="0.5" letterSpacing="3">ENYSTAN</text>
          <text x="300" y="30" textAnchor="middle" fill="#a0b0a0" fontSize="8" fontFamily="'JetBrains Mono'" fontWeight="600" opacity="0.6" letterSpacing="2">MONTAGNES D'ASTORIA</text>

          {/* Corridor A1 */}
          <line x1="150" y1="310" x2="470" y2="310" stroke="#e63946" strokeWidth="4" strokeDasharray="12,5" opacity="0.75"/>
          <line x1="150" y1="310" x2="470" y2="310" stroke="#ff8888" strokeWidth="1" opacity="0.25"/>
          <text x="310" y="335" textAnchor="middle" fill="#e63946" fontSize="8" fontFamily="'JetBrains Mono'" fontWeight="700" opacity="0.85">CORRIDOR A1 — 30 km</text>

          {/* Sea label */}
          <text x="300" y="420" textAnchor="middle" fill="#3a6a9a" fontSize="15" fontFamily="'Outfit'" fontWeight="700" opacity="0.3" letterSpacing="6">MER D'AZUR</text>

          {/* Lac label */}
          <text x="420" y="165" textAnchor="middle" fill="#48cae4" fontSize="8" fontFamily="'Outfit'" fontWeight="500" opacity="0.8">Lac Aurore</text>

          {/* Zone halos + labels */}
          {zones.map(z => {
            const alert = alerts.includes(z.id);
            return (
              <g key={z.id} onMouseEnter={()=>setHovered(z.id)} onMouseLeave={()=>setHovered(null)} style={{cursor:editable?"crosshair":"pointer"}}>
                <circle cx={z.x} cy={z.y} r={z.r+10} fill={z.color} opacity={0.06}/>
                <circle cx={z.x} cy={z.y} r={z.r} fill={z.color} opacity={hovered===z.id?0.4:0.15} stroke={z.color} strokeWidth={hovered===z.id?2.5:1.5} filter={alert?"url(#cityGlow)":""}/>
                {z.id==="port" && <rect x={z.x-12} y={z.y-5} width={24} height={10} rx={2} fill={z.color} opacity={0.25}/>}
                {z.id==="aeroport" && <><line x1={z.x-14} y1={z.y} x2={z.x+14} y2={z.y} stroke={z.color} strokeWidth="2" opacity="0.35"/><line x1={z.x} y1={z.y-10} x2={z.x} y2={z.y+10} stroke={z.color} strokeWidth="1" opacity="0.25"/></>}
                {z.id==="gouvernator" && <text x={z.x} y={z.y+3} textAnchor="middle" fill="#e9c46a" fontSize="16" fontWeight="800">★</text>}
                {alert && <circle cx={z.x} cy={z.y} r={z.r+5} fill="none" stroke="#e74c3c" strokeWidth="1.5" opacity="0.8">
                  <animate attributeName="r" from={z.r} to={z.r+18} dur="1.5s" repeatCount="indefinite"/>
                  <animate attributeName="opacity" from="0.8" to="0" dur="1.5s" repeatCount="indefinite"/>
                </circle>}
                <text x={z.x} y={z.y+z.r+14} textAnchor="middle" fill={hovered===z.id?"#fff":"#ddd"} fontSize="10" fontFamily="'Outfit'" fontWeight="600"
                  style={{textShadow:"0 1px 4px rgba(0,0,0,0.9)"}}>{z.name}</text>
              </g>
            );
          })}

          {/* PK markers */}
          {[12,18,22].map(pk => {
            const x = 150+(pk/30)*320;
            return <g key={pk}>
              <circle cx={x} cy={310} r={5} fill="#1a1a1a" stroke="#ff6b6b" strokeWidth="1.5"/>
              <text x={x} y={312} textAnchor="middle" fill="#ff6b6b" fontSize="6" fontFamily="'JetBrains Mono'" fontWeight="700">{pk}</text>
              <text x={x} y={298} textAnchor="middle" fill="#ff6b6b" fontSize="7" fontFamily="'JetBrains Mono'" opacity="0.8">PK{pk}</text>
            </g>;
          })}

          {/* Compass */}
          <g transform="translate(565,410)">
            <circle r="14" fill="rgba(10,10,20,0.7)" stroke="#555" strokeWidth="0.5"/>
            <line x1="0" y1="-10" x2="0" y2="10" stroke="#aaa" strokeWidth="0.5"/>
            <line x1="-10" y1="0" x2="10" y2="0" stroke="#aaa" strokeWidth="0.5"/>
            <polygon points="0,-10 -3,-3 3,-3" fill="#e63946" opacity="0.85"/>
            <polygon points="0,10 -3,3 3,3" fill="#888" opacity="0.5"/>
            <text x="0" y="-14" textAnchor="middle" fill="#e63946" fontSize="6" fontWeight="700">N</text>
          </g>

          {/* Scale */}
          <line x1="25" y1="438" x2="95" y2="438" stroke="#aaa" strokeWidth="1"/>
          <line x1="25" y1="435" x2="25" y2="441" stroke="#aaa" strokeWidth="1"/>
          <line x1="95" y1="435" x2="95" y2="441" stroke="#aaa" strokeWidth="1"/>
          <text x="60" y="446" textAnchor="middle" fill="#aaa" fontSize="6" fontFamily="'JetBrains Mono'">10 km</text>
        </>
      )}
      {/* Custom markers */}
      {markers.map(m => {
        const mc = MARKER_COLORS[m.type] || "#fff";
        const mi = MARKER_ICONS[m.type] || "●";
        return (
          <g key={m.id} onMouseEnter={()=>setHoveredMarker(m.id)} onMouseLeave={()=>setHoveredMarker(null)}>
            <circle cx={m.x} cy={m.y} r={12} fill={mc} opacity={0.15}/>
            <circle cx={m.x} cy={m.y} r={7} fill={mc+"33"} stroke={mc} strokeWidth={1.5}/>
            <text x={m.x} y={m.y+4} textAnchor="middle" fontSize="9" fill="#fff">{mi}</text>
            {(hoveredMarker===m.id || editable) && m.label && (
              <g>
                <rect x={m.x-40} y={m.y-24} width={80} height={16} rx={3} fill="#000" opacity={0.8}/>
                <text x={m.x} y={m.y-12} textAnchor="middle" fontSize="8" fill={mc} fontFamily="'JetBrains Mono'" fontWeight="600">{m.label}</text>
              </g>
            )}
          </g>
        );
      })}
      <text x="15" y="435" fill="#6c757d" fontSize="8" fontFamily="'JetBrains Mono'">OPÉRATION BRUMATOR — CARTE TACTIQUE</text>
      {editable && <text x="585" y="435" textAnchor="end" fill="#e63946" fontSize="7" fontFamily="'JetBrains Mono'">CLIQUEZ POUR PLACER</text>}
    </svg>
  );
};

const MessageCard = ({ msg, isAnimateur=false, onSend, sent=false, onRevealType, typeRevealed=false, t=THEMES.dark }) => {
  const tc = { "CONFIRMÉ":"#2ecc71","INTOX":"#e74c3c","FAUX":"#e74c3c","AMBIGU":"#f39c12","RUMEUR":"#e67e22","VRAI":"#2ecc71" };
  const showType = isAnimateur || typeRevealed;
  const bg = showType ? (tc[msg.type]||"#6c757d") : "#6c757d";
  return (
    <div style={{ background:t.bgCard2,border:`1px solid ${bg}22`,borderLeft:`3px solid ${showType?bg:"rgba(255,255,255,0.1)"}`,
      borderRadius:8,padding:"12px 16px",marginBottom:10,opacity:sent===false?0.5:1 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
        <div style={{ display:"flex",gap:8,alignItems:"center" }}>
          {showType ? (
            <span style={{ background:bg,color:t.text,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:4,
              fontFamily:"'JetBrains Mono'",textTransform:"uppercase",letterSpacing:1 }}>{msg.type}</span>
          ) : (
            <span style={{ background:"#6c757d",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:4,
              fontFamily:"'JetBrains Mono'",textTransform:"uppercase",letterSpacing:1 }}>À CLASSIFIER</span>
          )}
          <span style={{ color:t.textDim,fontSize:11,fontFamily:"'JetBrains Mono'" }}>{msg.heure}</span>
          {msg.isMedia && <span style={{fontSize:12}}>📱</span>}
          {msg.isCall && <span style={{fontSize:12}}>📞</span>}
          {msg.isCustom && <span style={{ background:"#9b59b622",color:"#9b59b6",fontSize:8,padding:"1px 5px",borderRadius:3,fontFamily:"'JetBrains Mono'" }}>CUSTOM</span>}
        </div>
        {isAnimateur && (
          <div style={{ display:"flex",gap:6,alignItems:"center" }}>
            {onSend && (
              <button onClick={()=>onSend(msg)} disabled={sent}
                style={{ background:sent?"#2d3436":bg,color:t.text,border:"none",borderRadius:4,
                  padding:"4px 12px",fontSize:11,fontWeight:600,cursor:sent?"default":"pointer",fontFamily:"'Outfit'" }}>
                {sent?"✓ Envoyé":"Injecter ▸"}
              </button>
            )}
            {sent && onRevealType && !typeRevealed && (
              <button onClick={()=>onRevealType(msg)}
                style={{ background:"rgba(230,57,70,0.1)",color:"#e63946",border:"1px solid #e6394633",borderRadius:4,
                  padding:"4px 10px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"'JetBrains Mono'" }}>
                👁 Révéler le type
              </button>
            )}
            {sent && typeRevealed && (
              <span style={{ color:"#2ecc71",fontSize:9,fontFamily:"'JetBrains Mono'" }}>✓ Type révélé</span>
            )}
          </div>
        )}
      </div>
      {msg.canal && <div style={{ color:t.textDim,fontSize:10,marginBottom:4,fontFamily:"'JetBrains Mono'" }}>{msg.canal} • {msg.source}</div>}
      <div style={{ color:t.textSoft,fontSize:13,lineHeight:1.5,fontFamily:"'Outfit'",whiteSpace:"pre-wrap" }}>{msg.contenu}</div>
      {msg.image && (
        <div style={{ marginTop:8 }}>
          <img src={msg.image} alt={msg.imageName||"Pièce jointe"}
            style={{ maxWidth:"100%",maxHeight:250,borderRadius:8,border:`1px solid ${t.borderStrong}`,
              cursor:"pointer",transition:"all 0.2s" }}
            onClick={e=>{
              if(e.target.style.maxHeight==="250px" || e.target.style.maxHeight===""){e.target.style.maxHeight="none";}
              else{e.target.style.maxHeight="250px";}
            }} />
          {msg.imageName && <div style={{ color:t.textDim,fontSize:9,marginTop:4,fontFamily:"'JetBrains Mono'" }}>📎 {msg.imageName}</div>}
        </div>
      )}
      <div style={{ display:"flex",gap:4,marginTop:8,flexWrap:"wrap" }}>
        {msg.dest?.map(d => { const c=CELLS.find(x=>x.id===d); return c ? <span key={d} style={{ background:c.color+"22",color:c.color,fontSize:9,padding:"2px 6px",borderRadius:3,fontFamily:"'JetBrains Mono'",fontWeight:500 }}>{c.icon} {c.name}</span> : null; })}
      </div>
      {isAnimateur && msg.noteAnim && (
        <div style={{ marginTop:8,padding:"6px 10px",background:"rgba(231,76,60,0.08)",borderRadius:4,
          border:"1px dashed rgba(231,76,60,0.2)",color:"#e74c3c",fontSize:11,fontFamily:"'Outfit'" }}>
          🎭 {msg.noteAnim}
        </div>
      )}
    </div>
  );
};

// Supabase REST helper (no SDK needed — works in artifact)
const supaRest = (url, key) => ({
  from: (table) => ({
    select: async (cols = "*") => {
      const r = await fetch(`${url}/rest/v1/${table}?select=${cols}`, {
        headers: { apikey: key, Authorization: `Bearer ${key}` }
      });
      return { data: await r.json(), error: r.ok ? null : "fetch error" };
    },
    insert: async (rows) => {
      const r = await fetch(`${url}/rest/v1/${table}`, {
        method: "POST", headers: { apikey: key, Authorization: `Bearer ${key}`,
          "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify(Array.isArray(rows) ? rows : [rows])
      });
      const body = await r.json();
      if (!r.ok) console.error("Supabase INSERT error [" + table + "]:", body?.message || JSON.stringify(body));
      return { data: r.ok ? body : [], error: r.ok ? null : body?.message || "insert error" };
    },
    update: (data) => ({
      eq: async (col, val) => {
        const r = await fetch(`${url}/rest/v1/${table}?${col}=eq.${val}`, {
          method: "PATCH", headers: { apikey: key, Authorization: `Bearer ${key}`,
            "Content-Type": "application/json", Prefer: "return=representation" },
          body: JSON.stringify(data)
        });
        return { data: await r.json(), error: r.ok ? null : "update error" };
      }
    }),
    selectEq: async (cols, col, val) => {
      const r = await fetch(`${url}/rest/v1/${table}?select=${cols}&${col}=eq.${val}`, {
        headers: { apikey: key, Authorization: `Bearer ${key}` }
      });
      const body = await r.json();
      return { data: r.ok ? body : [], error: r.ok ? null : body?.message || "fetch error" };
    },
    upsert: async (rows, onConflict) => {
      const oc = onConflict ? `?on_conflict=${onConflict}` : "";
      const r = await fetch(`${url}/rest/v1/${table}${oc}`, {
        method: "POST", headers: { apikey: key, Authorization: `Bearer ${key}`,
          "Content-Type": "application/json", Prefer: "return=representation,resolution=merge-duplicates" },
        body: JSON.stringify(Array.isArray(rows) ? rows : [rows])
      });
      const body = await r.json();
      if (!r.ok) console.error("Supabase UPSERT error [" + table + "]:", body?.message || JSON.stringify(body));
      return { data: r.ok ? body : [], error: r.ok ? null : body?.message || "upsert error" };
    },
    deleteEq: async (col, val) => {
      try {
        const r = await fetch(`${url}/rest/v1/${table}?${col}=eq.${val}`, {
          method: "DELETE", headers: { apikey: key, Authorization: `Bearer ${key}` }
        });
        return { error: r.ok ? null : "delete error" };
      } catch(e) { return { error: e.message }; }
    },
  })
});

const VideoPlayer = ({ item, t }) => {
  const W = 320, H = 180;
  const canvasRef = React.useRef(null);
  const rafRef    = React.useRef(null);
  const startRef  = React.useRef(null);
  const elRef     = React.useRef(0);
  const [playing, setPlaying] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const isDark = t && (t.bg||"").includes("0a0e") || (t && (t.bg||"").includes("06090"));

  const lerp = (a,b,t) => a+(b-a)*Math.min(1,Math.max(0,t));
  const ease = t => t<0.5?2*t*t:-1+(4-2*t)*t;

  const draw = React.useCallback((sec) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const scenes = item.scenes;
    const scene = scenes.find(s => sec>=s.start && sec<s.end) || scenes[scenes.length-1];
    const st = sec - scene.start;
    const p  = v => Math.min(1,Math.max(0,v));
    const fill = (x,y,w,h,c) => { ctx.fillStyle=c; ctx.fillRect(x,y,w,h); };
    const txt = (s,x,y,sz,c,al='left',bold=false) => {
      ctx.fillStyle=c;
      ctx.font=`${bold?'700 ':'400 '}${sz}px "Barlow Condensed",sans-serif`;
      ctx.textAlign=al; ctx.textBaseline='middle';
      ctx.fillText(s,x,y);
    };
    ctx.clearRect(0,0,W,H);

    if (scene.type==='sweep') {
      fill(0,0,W,H,'#07080d');
      const sp=ease(p(st/1.2)); fill(0,0,W*sp,H,'#1a56db');
      if (st>0.8) {
        const rv=ease(p((st-0.8)/0.8)); fill(0,0,W*rv,H,'#0c0d14');
        ctx.globalAlpha=rv;
        txt('IFA',W/2,H/2-12,H*0.16,'#fff','center',true);
        txt('BUSINESS',W/2,H/2+10,H*0.06,'rgba(255,255,255,0.65)','center',true);
        fill(W/2-H*0.12*rv/2,H/2+26,H*0.12*rv,2,'#1a56db');
        ctx.globalAlpha=1;
      }
    } else if (scene.type==='breaking') {
      fill(0,0,W,H,'#0c0d14');
      ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=0.5;
      for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
      const bw=W*0.26*ease(p(st/0.5)); fill(W-bw,H*0.08,bw,H*0.09,'#1a56db');
      if(p(st/0.5)>0.6){ctx.globalAlpha=(p(st/0.5)-0.6)/0.4;txt('FLASH INFO',W-8,H*0.08+H*0.045,H*0.047,'#fff','right',true);ctx.globalAlpha=1;}
      if(st>0.3){
        const hp=ease(p((st-0.3)/0.7)); ctx.globalAlpha=hp;
        const lines=item.headline.split('\n');
        lines.forEach((l,li)=>{
          if(li===0) fill(W*0.06-5,H*0.3+li*H*0.14-H*0.07,3,H*0.14,'#1a56db');
          txt(l.toUpperCase(),W*0.07,H*0.3+li*H*0.14,H*0.1,'#fff','left',true);
        });
        ctx.globalAlpha=1;
      }
      if(st>0.8){const s2=ease(p((st-0.8)/0.5));ctx.globalAlpha=s2;txt(item.sub,W*0.07,H*0.3+H*0.14*2+H*0.06,H*0.038,'rgba(255,255,255,0.5)','left');ctx.globalAlpha=1;}
      const tH=H*0.12,tY=H-tH; fill(0,tY,W,tH,'#1a56db'); fill(0,tY,W*0.18,tH,'#0d3a80');
      txt('EN DIRECT',W*0.09,tY+tH/2,tH*0.46,'#fff','center',true);
      ctx.save();ctx.beginPath();ctx.rect(W*0.18,tY,W*0.82,tH);ctx.clip();
      const tk=`${item.headline.replace('\n',' — ')}  ·  ${item.sub}  ·  ALT.PA ${item.stock}  ·  `;
      txt(tk,W*0.18+W-(sec*50)%(W*1.6),tY+tH/2,tH*0.42,'#fff','left');
      ctx.restore();
    } else if (scene.type==='stat') {
      fill(0,0,W,H,'#0c0d14');
      fill(0,0,W,H*0.14,'#0a0b12');
      txt('BILAN DE SITUATION',W*0.05,H*0.07,H*0.045,'rgba(255,255,255,0.45)','left',true);
      txt(item.tag,W*0.95,H*0.07,H*0.045,'rgba(26,86,219,0.8)','right',true);
      const stats=scene.stats;
      const cW=W*0.28,cY=H*0.18,cH=H*0.63;
      const sx=(W-stats.length*cW-(stats.length-1)*W*0.025)/2;
      stats.forEach(([lb,val,badge,bc],ci)=>{
        const cp=ease(p((st-ci*0.18)/0.5)); if(cp<=0)return;
        const cx=sx+ci*(cW+W*0.025);
        ctx.globalAlpha=cp;
        fill(cx,cY,cW,cH,'rgba(255,255,255,0.04)');
        fill(cx,cY,cW,2,bc==='red'?'#1a56db':'#e9a020');
        txt(lb.toUpperCase(),cx+cW/2,cY+cH*0.18,H*0.03,'rgba(255,255,255,0.4)','center',true);
        txt(val,cx+cW/2,cY+cH*0.46,H*0.057,'#fff','center',true);
        fill(cx+cW/2-cW*0.36,cY+cH*0.66,cW*0.72,cH*0.14,bc==='red'?'#1a56db':'rgba(233,160,32,0.9)');
        txt(badge,cx+cW/2,cY+cH*0.66+cH*0.07,H*0.028,'#fff','center',true);
        ctx.globalAlpha=1;
      });
      const tH2=H*0.12,tY2=H-tH2; fill(0,tY2,W,tH2,'#1a56db'); fill(0,tY2,W*0.18,tH2,'#0d3a80');
      txt('IFA NEWS',W*0.09,tY2+tH2/2,tH2*0.38,'#fff','center',true);
      ctx.save();ctx.beginPath();ctx.rect(W*0.18,tY2,W*0.82,tH2);ctx.clip();
      txt(`ALTEON ECLIPSE — ${item.headline.replace('\n',' ')} — `,W*0.18+W-(sec*50)%(W*1.6),tY2+tH2/2,tH2*0.42,'#fff','left');
      ctx.restore();
    } else if (scene.type==='outro') {
      fill(0,0,W,H,'#0c0d14');
      ctx.globalAlpha=lerp(1,0,ease(p((st-0.3)/0.8)));
      fill(0,H*0.35,W,H*0.3,'#1a56db');
      txt('IFA NEWS',W/2,H*0.44,H*0.1,'#fff','center',true);
      txt('ifanews.mil',W/2,H*0.57,H*0.038,'rgba(255,255,255,0.65)','center');
      ctx.globalAlpha=1;
    }
  }, [item]);

  // Init — draw frame 0 when canvas is mounted
  useEffect(() => {
    if (canvasRef.current) draw(0);
  }, [draw]);

  const play = () => {
    if (!canvasRef.current) return;
    setPlaying(true);
    startRef.current = null;
    const loop = (ts) => {
      if (!startRef.current) startRef.current = ts - elRef.current * 1000;
      elRef.current = (ts - startRef.current) / 1000;
      if (elRef.current >= item.dur) {
        elRef.current = item.dur;
        draw(item.dur);
        setElapsed(item.dur);
        setPlaying(false);
        return;
      }
      draw(elRef.current);
      setElapsed(Math.floor(elRef.current));
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
  };

  const pause = () => {
    cancelAnimationFrame(rafRef.current);
    setPlaying(false);
  };

  const replay = () => {
    cancelAnimationFrame(rafRef.current);
    elRef.current = 0;
    setElapsed(0);
    setPlaying(false);
    draw(0);
  };

  useEffect(() => () => cancelAnimationFrame(rafRef.current), []);

  const fmt = s => Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
  const border = 'rgba(255,255,255,0.08)';

  return (
    <div>
      <div style={{background:'#07080d',borderRadius:8,overflow:'hidden',marginBottom:10}}>
        <canvas ref={canvasRef} width={W} height={H} style={{width:'100%',height:'auto',display:'block'}}/>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button onClick={playing?pause:play}
          style={{background:'#1a56db',border:'none',borderRadius:6,padding:'6px 18px',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600}}>
          {playing?'⏸ Pause':'▶ Lecture'}
        </button>
        <button onClick={replay}
          style={{background:'none',border:`0.5px solid ${border}`,borderRadius:6,padding:'6px 12px',color:t?t.textDim:'#888',cursor:'pointer',fontSize:12}}>↺</button>
        <div style={{flex:1,height:3,background:'rgba(255,255,255,0.08)',borderRadius:2}}>
          <div style={{height:'100%',background:'#1a56db',borderRadius:2,width:`${(elapsed/item.dur)*100}%`,transition:'width 0.3s'}}/>
        </div>
        <span style={{fontSize:10,color:t?t.textDim:'#888',fontFamily:"'JetBrains Mono'",minWidth:30}}>{fmt(elapsed)}/{fmt(item.dur)}</span>
      </div>
    </div>
  );
};

  const audioCtxRef = useRef(null);

  // Sound system
  const playSound = useCallback((type) => {
    if (notifMuted) return;
    try {
      if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtxRef.current;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      if (type === "injection") {
        osc.type = "sine"; osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
      } else if (type === "flash") {
        osc.type = "square"; osc.frequency.setValueAtTime(660, ctx.currentTime);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.08);
        setTimeout(() => {
          const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
          o2.connect(g2); g2.connect(ctx.destination);
          o2.type = "square"; o2.frequency.setValueAtTime(880, ctx.currentTime);
          g2.gain.setValueAtTime(0.12, ctx.currentTime);
          g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
          o2.start(ctx.currentTime); o2.stop(ctx.currentTime + 0.08);
        }, 120);
      } else if (type === "chat") {
        osc.type = "sine"; osc.frequency.setValueAtTime(1200, ctx.currentTime);
        gain.gain.setValueAtTime(0.06, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
