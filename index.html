  // Connect to Supabase + join/create session
  const connectSupabase = useCallback(async (url, key, code, role, cellId) => {
    try {
      setConnectionStatus("connecting");
      const db = supaRest(url, key);
      dbRef.current = db;

      // Find or create session
      let sid = null;
      if (code) {
        const { data } = await db.from("game_sessions").selectEq("*", "code", code);
        if (data && data.length > 0) {
          sid = data[0].id;
          setActiveVignette(data[0].active_vignette || 1);
          setActiveCellVignette(data[0].active_vignette || 1);
          setTimer(data[0].timer_seconds || 5400);
          setTimerRunning(data[0].timer_running || false);
          setSessionTags({ client: data[0].client_name || "", prestation: data[0].prestation_type || "", lieu: data[0].lieu || "" });
        }
      }
      if (!sid) {
        // Create new session
        const newCode = code || `BRU-${String(Math.floor(Math.random()*100)).padStart(2,"0")}`;
        const { data } = await db.from("game_sessions").insert({ code: newCode, name: "Opération BRUMATOR", started_at: new Date().toISOString() });
        if (data && data[0]) { sid = data[0].id; setSessionCode(newCode); }
      }

      if (!sid) { setConnectionStatus("error"); return; }
      setSessionId(sid);

      // Register player (will be updated with correct role on role select)
      const { data: playerData } = await db.from("players").insert({
        session_id: sid, cell_id: cellId || "pending",
        role: role || "pending", display_name: "En attente",
        connected: true
      });
      if (playerData && playerData[0]) playerIdRef.current = playerData[0].id;

      // Load existing state
      const { data: inbox } = await db.from("cell_inbox").selectEq("*", "session_id", sid);
      if (inbox && inbox.length) {
        const grouped = { operations:[], logistique:[], renseignement:[], coordination:[], milices:[] };
        inbox.forEach(m => {
          const mapped = {
            id: m.id, vignette: m.vignette, injection_id: String(m.injection_id || ""),
            type: m.message_type || m.type, contenu: m.contenu, canal: m.canal,
            source: m.source, heure: m.heure, fiabilite: m.fiabilite,
            isMedia: m.is_media || false, isCall: m.is_call || false,
            isCustom: m.is_custom || false,
            receivedAt: m.received_at ? new Date(m.received_at).toLocaleTimeString("fr-FR") : "",
            dest: [m.cell_id],
          };
          if (grouped[m.cell_id]) grouped[m.cell_id].push(mapped);
        });
        setCellInbox(grouped);
      }
      const { data: chats } = await db.from("chat_messages").selectEq("*", "session_id", sid);
      if (chats && chats.length) setChatMessages(chats.map(c => ({
        id: c.id, from: c.from_cell, channel: c.channel, text: c.text,
        time: new Date(c.sent_at).toLocaleTimeString("fr-FR"), timestamp: new Date(c.sent_at).getTime()
      })));
      const { data: injSent } = await db.from("injections_sent").selectEq("*", "session_id", sid);
      if (injSent && injSent.length) {
        const si = {};
        injSent.forEach(i => { si[`${i.vignette}-${i.injection_id}`] = true; });
        setSentInjections(si);
      }

      setDemoMode(false);
      setConnectionStatus("connected");

      // Start polling (every 2s)
      if (pollRef.current) clearInterval(pollRef.current);
      pollRef.current = setInterval(() => pollUpdates(db, sid), 2000);
    } catch(e) {
      console.error("Supabase connection error:", e);
      setConnectionStatus("error");
    }
  }, []);

  // Poll for updates
  const pollUpdates = useCallback(async (db, sid) => {
    if (!db || !sid) return;
    try {
      // Session state
      const { data: sessions } = await db.from("game_sessions").selectEq("*", "id", sid);
      // Poll succeeded — reset failure counter and restore connection
      pollFailRef.current = 0;
      setConnectionLost(false);
      if (sessions?.[0]) {
        const s = sessions[0];
        if (s.active_vignette) setActiveCellVignette(s.active_vignette);
        if (s.synth_phase) setSynthPhase(s.synth_phase);
        if (s.status === "ended" && selectedCellRef.current) setScreen("thanks");
        if (s.timer_running && s.timer_started_at) {
          const elapsed = Math.floor((Date.now() - new Date(s.timer_started_at).getTime()) / 1000);
          setTimer(Math.max(0, s.timer_seconds - elapsed));
        }
        setTimerRunning(s.timer_running);
      }
      // Chat (last 100)
      const { data: chats } = await db.from("chat_messages").selectEq("*", "session_id", sid);
      if (chats) {
        const mapped = chats.map(c => ({
          id: c.id, from: c.from_cell, channel: c.channel, text: c.text,
          time: new Date(c.sent_at).toLocaleTimeString("fr-FR"), timestamp: new Date(c.sent_at).getTime()
        }));
        setChatMessages(prev => {
          // Always sync from Supabase — use server as source of truth
          const prevIds = new Set(prev.map(m => m.id).filter(id => typeof id === "string" && id.includes("-")));
          const newIds = new Set(mapped.map(m => m.id));
          const hasNewFromServer = mapped.some(m => !prevIds.has(m.id));
          if (mapped.length !== prev.length || hasNewFromServer) return mapped;
          return prev;
        });
      } else {
        setChatMessages(prev => prev.length > 0 ? [] : prev);
      }
      // Inbox
      const { data: inbox } = await db.from("cell_inbox").selectEq("*", "session_id", sid);
      if (inbox) {
        const grouped = { operations:[], logistique:[], renseignement:[], coordination:[], milices:[] };
        inbox.forEach(m => {
          // Map SQL column names → JS field names
          const mapped = {
            id: m.id, vignette: m.vignette, injection_id: String(m.injection_id || ""),
            type: m.message_type || m.type, contenu: m.contenu, canal: m.canal,
            source: m.source, heure: m.heure, fiabilite: m.fiabilite,
            isMedia: m.is_media || m.isMedia || false,
            isCall: m.is_call || m.isCall || false,
            isCustom: m.is_custom || m.isCustom || false,
            receivedAt: m.received_at ? new Date(m.received_at).toLocaleTimeString("fr-FR") : m.receivedAt || "",
            dest: m.dest || [m.cell_id],
          };
          if (grouped[m.cell_id]) grouped[m.cell_id].push(mapped);
        });
        setCellInbox(prev => {
          const totalPrev = Object.values(prev).reduce((a,b) => a+b.length, 0);
          if (inbox.length !== totalPrev) return grouped;
          return prev;
        });
      }
      // Players online
      const { data: players } = await db.from("players").selectEq("*", "session_id", sid);
      if (players) {
        const connected = players.filter(p => p.connected);
        setPlayersOnline(connected);
        // Track peak connections
        if (connected.length > 0 && dbRef.current) {
          const currentPeak = sessions?.[0]?.peak_connections || 0;
          if (connected.length > currentPeak) {
            db.from("game_sessions").update({ peak_connections: connected.length }).eq("id", sid);
          }
        }
      }
      // Injections sent
      const { data: injSent } = await db.from("injections_sent").selectEq("*", "session_id", sid);
      if (injSent) {
        const si = {};
        injSent.forEach(i => { si[`${i.vignette}-${i.injection_id}`] = true; });
        setSentInjections(si);
      }

      // Poll syntheses — never overwrite the current cell's own data
      const { data: synths } = await db.from("cell_syntheses").selectEq("*", "session_id", sid);
      if (synths && synths.length) {
        const myCell = selectedCellRef.current; // null for animateur
        const mapped = {};
        synths.forEach(s => { mapped[s.cell_id] = synthFromSQL(s); });
        setCellSyntheses(prev => {
          const merged = {...prev};
          Object.keys(mapped).forEach(cellId => {
            // Skip overwriting MY OWN cell data — I am the source of truth for my cell
            if (cellId === myCell) return;
            merged[cellId] = mapped[cellId];
          });
          const prevStr = JSON.stringify(prev);
          const newStr = JSON.stringify(merged);
          return prevStr !== newStr ? merged : prev;
        });
      }
      // Poll revealed types
      const { data: revTypes } = await db.from("revealed_types").selectEq("*", "session_id", sid);
      if (revTypes && revTypes.length) {
        const rt = {};
        revTypes.forEach(r => { rt[String(r.vignette) + "-" + String(r.injection_id)] = true; });
        setRevealedTypes(prev => {
          const prevKeys = Object.keys(prev).sort().join(",");
          const newKeys = Object.keys(rt).sort().join(",");
          return prevKeys !== newKeys ? rt : prev;
        });
      } else if (revTypes) {
        setRevealedTypes(prev => Object.keys(prev).length > 0 ? {} : prev);
      }
      // Poll fullscreen alerts — show newest alert if not already shown
      const { data: alerts } = await db.from("fullscreen_alerts").selectEq("*", "session_id", sid);
      if (alerts && alerts.length) {
        const latest = alerts.reduce((a, b) => new Date(a.sent_at || 0) > new Date(b.sent_at || 0) ? a : b);
        if (latest.id && latest.id !== lastAlertIdRef.current) {
          lastAlertIdRef.current = latest.id;
          setFullscreenAlert({ text: latest.text, icon: latest.icon, color: latest.color });
        }
      }
      // Poll press items → rebuild full media objects from ALL_MEDIA
      const { data: press } = await db.from("press_items").selectEq("*", "session_id", sid);
      if (press && press.length) {
        const allMediaFlat = Object.values(ALL_MEDIA).flat();
        const rebuilt = press.map(p => {
          const full = allMediaFlat.find(m => m.id === p.media_id);
          return full || { id: p.media_id, vignette: p.vignette, type: "article", headline: p.media_id };
        }).filter(Boolean);
        setPressItems(prev => {
          if (rebuilt.length !== prev.length) return rebuilt;
          return prev;
        });
      } else if (press) {
        // Empty result → clear press items (e.g. after reset)
        setPressItems(prev => prev.length > 0 ? [] : prev);
      }
      // Poll map markers
      const { data: markers } = await db.from("map_markers").selectEq("*", "session_id", sid);
      if (markers && markers.length) {
        const mapped = markers.map(m => ({
          id: m.id, type: m.marker_type, x: m.x, y: m.y, label: m.label, dest: m.dest || []
        }));
        setMapMarkers(prev => {
          if (mapped.length !== prev.length) return mapped;
          return prev;
        });
      } else if (markers) {
        setMapMarkers(prev => prev.length > 0 ? [] : prev);
      }
      // Poll SITREPs (global + cells) — never overwrite current cell's own data
      const { data: sitrepData } = await db.from("sitreps").selectEq("*", "session_id", sid);
      if (sitrepData && sitrepData.length) {
        const myCell = selectedCellRef.current;
        sitrepData.forEach(sr => {
          if (sr.cell_id === "global") {
            setSitrep(sitrepFromSQL(sr));
            setSitrepInjected(true);
          } else if (sr.cell_id !== myCell) {
            // Only update OTHER cells' sitreps, not my own
            setCellSitreps(prev => ({...prev, [sr.cell_id]: sitrepFromSQL(sr)}));
          }
        });
      }
    } catch(e) {
      pollFailRef.current++;
      if (pollFailRef.current >= 3) setConnectionLost(true);
    }
  }, []);

  // Sync helpers — push to Supabase when not in demo mode
  // Cleanup polling on unmount
  useEffect(() => {
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, []);

  // ============================================================
  // LANDING
  // ============================================================
  if (screen === "landing") {
    const supaConfigured = supaUrl && supaKey && supaUrl !== "VOTRE_URL_SUPABASE";
    return (
      <div style={{ minHeight:"100vh",background:theme==="dark"?"#06090f":"linear-gradient(180deg,#e8ecf1 0%,#dce1e8 50%,#d0d6df 100%)",display:"flex",flexDirection:"column",
        alignItems:"center",justifyContent:"center",fontFamily:"'Outfit'",position:"relative",overflow:"hidden" }}>
        <style>{CSS}{`
          @keyframes heroReveal { from{opacity:0;transform:translateY(40px) scale(0.95);filter:blur(8px)} to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)} }
          @keyframes lineExpand { from{width:0;opacity:0} to{width:min(320px,60vw);opacity:1} }
          @keyframes tagReveal { from{opacity:0;transform:translateY(8px);letter-spacing:12px} to{opacity:1;transform:translateY(0);letter-spacing:6px} }
          @keyframes subtitleType { from{max-width:0;opacity:0} to{max-width:700px;opacity:1} }
          @keyframes dotPulse { 0%,100%{opacity:1;box-shadow:0 0 4px #e63946} 50%{opacity:0.4;box-shadow:0 0 12px #e63946,0 0 24px rgba(230,57,70,0.3)} }
          @keyframes gradMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
          @keyframes glitchFlash { 0%,100%{opacity:1;transform:translate(0)} 20%{opacity:1} 21%{opacity:0.7;transform:translate(-3px,1px)} 22%{opacity:1;transform:translate(2px,-1px)} 23%{opacity:1;transform:translate(0)} 60%{opacity:1} 61%{opacity:0.8;transform:translate(1px,2px)} 62%{opacity:1;transform:translate(0)} }
          @keyframes scanPass { from{top:-20%} to{top:120%} }
          @keyframes fadeSlideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
          @keyframes flapFlicker { 0%{transform:scaleY(1)} 50%{transform:scaleY(0.92)} 100%{transform:scaleY(1)} }
          @keyframes borderPulse { 0%,100%{border-color:rgba(230,57,70,0.15)} 50%{border-color:rgba(230,57,70,0.45)} }
          .hero-op { font-size:clamp(13px,2.5vw,16px); font-weight:400; letter-spacing:clamp(8px,2vw,20px); text-transform:uppercase; }
          .hero-brumator { font-size:clamp(52px,12vw,110px); font-weight:900; line-height:0.85; letter-spacing:clamp(-2px,-0.5vw,-4px); }
        `}</style><ScanLine theme={theme}/>
        {/* Background layers */}
        <div style={{ position:"absolute",inset:0,backgroundImage:theme==="dark"?"radial-gradient(circle at 1px 1px,rgba(255,255,255,0.02) 1px,transparent 0)":"radial-gradient(circle at 1px 1px,rgba(0,0,0,0.03) 1px,transparent 0)",backgroundSize:"32px 32px" }}/>
        <div style={{ position:"absolute",width:"80vw",height:"80vw",maxWidth:800,maxHeight:800,borderRadius:"50%",
          background:theme==="dark"?"radial-gradient(circle,rgba(230,57,70,0.06) 0%,rgba(230,57,70,0.02) 40%,transparent 70%)":"radial-gradient(circle,rgba(85,107,47,0.08) 0%,rgba(85,107,47,0.03) 40%,transparent 70%)",
          top:"15%",left:"50%",transform:"translateX(-50%)",filter:"blur(80px)",pointerEvents:"none" }}/>
        <div style={{ position:"absolute",width:"40vw",height:"40vw",maxWidth:400,maxHeight:400,borderRadius:"50%",
          background:theme==="dark"?"radial-gradient(circle,rgba(244,162,97,0.04) 0%,transparent 60%)":"radial-gradient(circle,rgba(107,142,35,0.06) 0%,transparent 60%)",
          bottom:"10%",right:"10%",filter:"blur(60px)",pointerEvents:"none" }}/>
        {/* Scan line overlay */}
        <div style={{ position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none" }}>
          <div style={{ position:"absolute",left:0,right:0,height:"1px",background:theme==="dark"?"linear-gradient(90deg,transparent,rgba(230,57,70,0.12),transparent)":"linear-gradient(90deg,transparent,rgba(85,107,47,0.15),transparent)",animation:"scanPass 8s linear infinite" }}/>
        </div>

        {/* Main content */}
        <div style={{ textAlign:"center",zIndex:10,maxWidth:"90vw",padding:"0 20px" }}>
          {/* Classified tag */}
          <div style={{ animation:"tagReveal 1s ease-out 0.2s both",marginBottom:24 }}>
            <span style={{ display:"inline-flex",alignItems:"center",gap:10,padding:"7px 20px",
              border:theme==="dark"?"1px solid rgba(230,57,70,0.25)":"1px solid rgba(192,57,43,0.35)",borderRadius:4,animation:"borderPulse 3s ease infinite",
              background:theme==="dark"?"rgba(230,57,70,0.04)":"rgba(192,57,43,0.08)" }}>
              <span style={{ width:6,height:6,borderRadius:"50%",background:theme==="dark"?"#e63946":"#c0392b",animation:"dotPulse 2s ease infinite" }}/>
              <span style={{ color:theme==="dark"?"#e63946":"#c0392b",fontSize:10,letterSpacing:6,fontWeight:700,fontFamily:"'JetBrains Mono'" }}>EXERCICE CLASSIFIÉ</span>
              <span style={{ width:6,height:6,borderRadius:"50%",background:theme==="dark"?"#e63946":"#c0392b",animation:"dotPulse 2s ease infinite 0.5s" }}/>
            </span>
          </div>

          {/* Title block */}
          <div style={{ animation:"heroReveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.4s both" }}>
            <div style={{ color:theme==="dark"?"#fff":"#1a1a2e",fontFamily:"'Outfit'",marginBottom:12,
              fontSize:"clamp(24px,5vw,44px)",fontWeight:800,letterSpacing:"clamp(4px,1.5vw,14px)",textTransform:"uppercase" }}>
              OPÉRATION
            </div>
            {/* Split-flap airport board */}
            <div style={{ display:"flex",justifyContent:"center",gap:"clamp(3px,0.8vw,8px)" }}>
              {"BRUMATOR".split("").map((letter, i) => (
                <SplitFlapLetter key={i} letter={letter} index={i} theme={theme} />
              ))}
            </div>
          </div>

          {/* Separator line */}
          <div style={{ margin:"24px auto",height:1,animation:"lineExpand 1s ease-out 1s both",
            background:theme==="dark"?"linear-gradient(90deg,transparent,rgba(230,57,70,0.5),rgba(244,162,97,0.3),transparent)":"linear-gradient(90deg,transparent,rgba(85,107,47,0.5),rgba(107,142,35,0.3),transparent)" }}/>

          {/* Subtitle */}
          <div style={{ animation:"fadeSlideUp 0.8s ease-out 1.3s both" }}>
            <div style={{ fontSize:13,color:t.textDim,fontFamily:"'JetBrains Mono'",letterSpacing:2,marginBottom:6,
              overflow:"hidden",whiteSpace:"nowrap",display:"inline-block" }}>
              IFAstoria — République d'Astoria
            </div>
            <div style={{ fontSize:11,color:t.textGhost,fontFamily:"'JetBrains Mono'",letterSpacing:1 }}>
              EM Spécial IFA / Métropole
            </div>
          </div>

          {/* Mission brief */}
          <div style={{ animation:"fadeSlideUp 0.8s ease-out 1.6s both" }}>
            <p style={{ color:t.textMuted,fontSize:14,maxWidth:480,lineHeight:1.7,margin:"24px auto 30px",
              padding:"12px 20px",borderLeft:theme==="dark"?"2px solid rgba(230,57,70,0.2)":"2px solid rgba(85,107,47,0.3)",textAlign:"left",
              background:theme==="dark"?"rgba(230,57,70,0.02)":"rgba(85,107,47,0.05)",borderRadius:"0 8px 8px 0" }}>
              <span style={{ color:theme==="dark"?"#e63946":"#556B2F",fontWeight:600 }}>Mission</span> — Sécurisation du port et de l'aéroport<br/>
              <span style={{ color:t.textDim,fontSize:12 }}>Forces spéciales IFA — 4 × A400M — 300h interarmes — 72 heures</span>
            </p>
          </div>

          {/* SESSION JOIN — directly on landing */}
          <div style={{ animation:"fadeSlideUp 0.8s ease-out 1.9s both" }}>
          {supaConfigured ? (
            <div style={{ background:theme==="dark"?t.bgCard2:"rgba(255,255,255,0.85)",border:`1px solid ${t.borderStrong}`,
              borderRadius:16,padding:"28px 32px",width:420,maxWidth:"90vw",margin:"0 auto 20px",
              boxShadow:theme==="dark"?"0 8px 40px rgba(0,0,0,0.3)":"0 8px 40px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.05)",
              backdropFilter:theme==="light"?"blur(12px)":"none" }}>
              {connectionStatus === "connected" ? (
                <div>
                  <div style={{ display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:12 }}>
                    <span style={{ width:10,height:10,borderRadius:"50%",background:"#2ecc71",boxShadow:"0 0 8px #2ecc71" }}/>
                    <span style={{ color:"#2ecc71",fontSize:15,fontWeight:700 }}>Connecté — Session {sessionCode}</span>
                  </div>
                  <div style={{ color:t.textDim,fontSize:12,marginBottom:16 }}>{playersOnline.length} joueur(s) en ligne</div>
                  <button onClick={()=>setScreen("roleSelect")} style={{
                    background:"linear-gradient(135deg,#e63946,#c0392b)",color:"#fff",border:"none",borderRadius:10,
                    padding:"14px 40px",fontSize:16,fontWeight:700,cursor:"pointer",letterSpacing:1,width:"100%",
                    boxShadow:"0 4px 30px rgba(230,57,70,0.3)",transition:"all 0.3s" }}
                    onMouseOver={e=>e.target.style.transform="translateY(-2px)"}
                    onMouseOut={e=>e.target.style.transform="translateY(0)"}>
                    CHOISIR MON RÔLE ▸
                  </button>
                </div>
              ) : (
                <div>
                  <div style={{ display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16 }}>
                    <span style={{ width:8,height:8,borderRadius:"50%",background:"#2ecc71" }}/>
                    <span style={{ color:"#2ecc71",fontSize:12,fontFamily:"'JetBrains Mono'" }}>Serveur connecté</span>
                  </div>
                  <label style={{ color:t.textMuted,fontSize:12,fontFamily:"'JetBrains Mono'",display:"block",marginBottom:8,letterSpacing:1 }}>
                    CODE DE SESSION
                  </label>
                  <input type="text" placeholder="ex: BRU-01"
                    value={sessionCode} onChange={e=>setSessionCode(e.target.value.toUpperCase())}
                    style={{ background:t.bgCard3,border:"2px solid rgba(230,57,70,0.3)",
                      borderRadius:10,padding:"14px 16px",color:t.text,fontSize:22,fontFamily:"'JetBrains Mono'",
                      outline:"none",letterSpacing:4,textAlign:"center",width:"100%",boxSizing:"border-box",
                      transition:"border-color 0.2s" }}
                    onFocus={e=>e.target.style.borderColor="rgba(230,57,70,0.7)"}
                    onBlur={e=>e.target.style.borderColor="rgba(230,57,70,0.3)"} />
                  <button onClick={()=>connectSupabase(supaUrl, supaKey, sessionCode)}
                    disabled={!sessionCode.trim() || connectionStatus === "connecting"}
                    style={{ background:connectionStatus==="connecting"?"#6c757d":
                      !sessionCode.trim()?(theme==="dark"?"#333":"#9ca3af"):"linear-gradient(135deg,#2ecc71,#1a8a4a)",
                      color:"#fff",border:"none",borderRadius:10,padding:"14px",cursor:sessionCode.trim()?"pointer":"not-allowed",
                      fontSize:15,fontWeight:700,fontFamily:"'Outfit'",width:"100%",marginTop:12,
                      boxShadow:sessionCode.trim()?"0 4px 20px rgba(46,204,113,0.3)":"none",
                      transition:"all 0.3s",letterSpacing:1 }}>
                    {connectionStatus === "connecting" ? "⏳ Connexion en cours..." : connectionStatus === "error" ? "🔄 Réessayer" : "🚀 REJOINDRE LA SESSION"}
                  </button>
                  {connectionStatus === "error" && (
                    <div style={{ color:"#e74c3c",fontSize:12,marginTop:8,fontFamily:"'JetBrains Mono'" }}>
                      Erreur de connexion. Vérifiez le code session.
                    </div>
                  )}
                </div>
              )}
            </div>
          ) : (
            <button onClick={()=>setScreen("roleSelect")} style={{
              background:"linear-gradient(135deg,#e63946,#c0392b)",color:"#fff",border:"none",borderRadius:10,
              padding:"14px 48px",fontSize:16,fontWeight:700,fontFamily:"'Outfit'",cursor:"pointer",letterSpacing:1,
              boxShadow:"0 4px 30px rgba(230,57,70,0.3)",transition:"all 0.3s",marginBottom:20 }}
              onMouseOver={e=>e.target.style.transform="translateY(-2px)"}
              onMouseOut={e=>e.target.style.transform="translateY(0)"}>
              MODE DÉMO — ACCÉDER ▸
            </button>
          )}

          </div>{/* end fadeSlideUp wrapper */}

          {/* Bottom controls */}
          <div style={{ marginTop:16,display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",animation:"fadeSlideUp 0.6s ease-out 2.3s both" }}>
            <button onClick={()=>setTheme(theme==="dark"?"light":"dark")}
              style={{ background:"none",border:`1px solid ${t.borderStrong}`,borderRadius:6,
                padding:"6px 16px",color:t.textDim,fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono'",
                transition:"all 0.2s" }}>
              {theme==="dark"?"☀️ Mode clair":"🌙 Mode sombre"}
            </button>
            {supaConfigured && !connectionStatus.match(/connected/) && (
              <button onClick={()=>{setDemoMode(true);setScreen("roleSelect");}}
                style={{ background:"none",border:`1px solid ${t.border}`,borderRadius:6,
                  padding:"6px 16px",color:t.textGhost,fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono'" }}>
                Mode démo (hors ligne)
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // ROLE SELECT
  // ============================================================
  if (screen === "roleSelect") {
    return (
      <div style={{ minHeight:"100vh",background:t.bg,fontFamily:"'Outfit'",padding:"40px 20px" }}>
        <style>{CSS}</style><ScanLine theme={theme}/>
        <div style={{ maxWidth:900,margin:"0 auto" }}>
          <button onClick={()=>setScreen("landing")} style={{ background:"none",border:"none",color:t.textDim,cursor:"pointer",fontFamily:"'JetBrains Mono'",fontSize:12,marginBottom:30 }}>← Retour</button>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <h2 style={{ color:t.text,fontSize:28,fontWeight:800,marginBottom:8 }}>Sélection du rôle</h2>
            <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{
              background:"none",color:t.textDim,border:`1px solid ${t.borderStrong}`,
              borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:11,fontFamily:"'JetBrains Mono'" }}>
              {theme==="dark"?"☀️ Mode clair":"🌙 Mode sombre"}
            </button>
          </div>
          <p style={{ color:t.textDim,fontSize:13,marginBottom:30,fontFamily:"'JetBrains Mono'" }}>Choisissez votre cellule ou accédez au panneau animateur</p>
          {/* Facilitator */}
          <div onClick={()=>{
            setScreen("facilitator");
            if (!demoMode && dbRef.current && playerIdRef.current) {
              dbRef.current.from("players").update({ cell_id: "facilitator", role: "facilitator", display_name: "Animateur" }).eq("id", playerIdRef.current);
            }
          }}
            role="button" tabIndex={0}
            onKeyDown={e=>{if(e.key==="Enter"){setScreen("facilitator");if(!demoMode&&dbRef.current&&playerIdRef.current){dbRef.current.from("players").update({cell_id:"facilitator",role:"facilitator",display_name:"Animateur"}).eq("id",playerIdRef.current);}}}}
            style={{ background:"linear-gradient(135deg,rgba(230,57,70,0.08),rgba(230,57,70,0.02))",
              border:"1px solid rgba(230,57,70,0.2)",borderRadius:12,padding:20,marginBottom:24,cursor:"pointer",transition:"all 0.3s",animation:"slideUp 0.4s ease-out" }}
            onMouseOver={e=>e.currentTarget.style.borderColor="#e63946"}
            onMouseOut={e=>e.currentTarget.style.borderColor="rgba(230,57,70,0.2)"}>
            <div style={{ display:"flex",alignItems:"center",gap:12 }}>
              <span style={{ fontSize:28 }}>🎭</span>
              <div>
                <div style={{ color:"#e63946",fontSize:18,fontWeight:700 }}>Panneau Animateur</div>
                <div style={{ color:t.textDim,fontSize:12 }}>Contrôle des injections, timer, vue globale, revue de presse — EM spécial IFA 300h</div>
              </div>
            </div>
          </div>
          {/* Cells */}
          <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12 }}>
            {CELLS.map((cell,i) => (
              <div key={cell.id} onClick={()=>{
                setSelectedCell(cell.id);selectedCellRef.current=cell.id;setScreen("cell");
                if (!demoMode && dbRef.current && playerIdRef.current) {
                  dbRef.current.from("players").update({ cell_id: cell.id, role: "player", display_name: cell.name }).eq("id", playerIdRef.current);
                }
              }}
                style={{ background:`linear-gradient(135deg,${cell.color}10,${cell.color}05)`,
                  border:`1px solid ${cell.color}30`,borderRadius:12,padding:20,cursor:"pointer",transition:"all 0.3s",
                  animation:`slideUp ${0.4+i*0.1}s ease-out` }}
                onMouseOver={e=>e.currentTarget.style.borderColor=cell.color}
                onMouseOut={e=>e.currentTarget.style.borderColor=`${cell.color}30`}>
                <span style={{ fontSize:28 }}>{cell.icon}</span>
                <div style={{ color:t.text,fontSize:16,fontWeight:700,marginTop:8 }}>{cell.name}</div>
                <div style={{ color:t.textDim,fontSize:12,marginTop:4,lineHeight:1.4 }}>{cell.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // FACILITATOR
  // ============================================================
  if (screen === "facilitator") {
    const injections = ALL_INJECTIONS[activeVignette] || [];
    const sentCount = injections.filter(inj => sentInjections[`${activeVignette}-${inj.id}`]).length;

    return (
      <div style={{ minHeight:"100vh",background:t.bg,fontFamily:"'Outfit'" }}>
        <style>{CSS}</style><ScanLine theme={theme}/>
        <ConnectionBanner lost={connectionLost} t={t}/>

        {/* PASSWORD OVERLAY */}
        {facLocked && <div style={{ position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:99999,
          background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20 }}>
          <div style={{ textAlign:"center",maxWidth:380,width:"100%" }}>
            <div style={{ fontSize:48,marginBottom:16 }}>🔐</div>
            <h2 style={{ color:t.text,fontSize:22,fontWeight:800,margin:"0 0 6px" }}>Panneau Animateur</h2>
            <p style={{ color:t.textDim,fontSize:13,margin:"0 0 24px" }}>Accès réservé — entrez le mot de passe</p>
            <input type="password" value={facPassword} autoComplete="off"
              onChange={e=>{setFacPassword(e.target.value);setFacPwError(false);}}
              onKeyDown={e=>{if(e.key==="Enter"){if(facPassword===FAC_PASSWORD){setFacLocked(false);setFacPassword("");setFacPwError(false);}else{setFacPwError(true);setFacPassword("");}}}}
              placeholder="Mot de passe..."
              style={{ width:"100%",background:t.inputBg,border:`2px solid ${facPwError?"#e74c3c":t.inputBorder}`,
                borderRadius:10,padding:16,color:t.text,fontSize:18,fontFamily:"'Outfit'",
                outline:"none",boxSizing:"border-box",textAlign:"center",letterSpacing:4,marginBottom:10 }} />
            <button onClick={()=>{if(facPassword===FAC_PASSWORD){setFacLocked(false);setFacPassword("");setFacPwError(false);}else{setFacPwError(true);setFacPassword("");}}}
              style={{ width:"100%",background:"linear-gradient(135deg,#e63946,#c0392b)",color:"#fff",border:"none",
                borderRadius:10,padding:16,cursor:"pointer",fontFamily:"'Outfit'",fontSize:16,fontWeight:700,minHeight:52 }}>
              Accéder
            </button>
            {facPwError && <div style={{ color:"#e74c3c",fontSize:14,marginTop:14,fontWeight:600 }}>✕ Mot de passe incorrect</div>}
            <button onClick={()=>{setScreen("roleSelect");setFacPassword("");setFacPwError(false);setFacLocked(true);}}
              style={{ background:"none",border:"none",color:t.textDim,cursor:"pointer",fontFamily:"'JetBrains Mono'",fontSize:13,marginTop:28,padding:12,minHeight:44 }}>
              ← Retour
            </button>
          </div>
        </div>}

        {/* Top bar */}
        <div style={{ background:t.bgBarSolid,borderBottom:`1px solid ${t.border}`,
          padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",
          flexWrap:"wrap",gap:10,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(20px)" }}>
          <div style={{ display:"flex",alignItems:"center",gap:16 }}>
            <button onClick={()=>{setScreen("roleSelect");setFacLocked(true);}} style={{ background:"none",border:"none",color:t.textDim,cursor:"pointer",fontSize:18 }}>←</button>
            <div>
              <div style={{ color:"#e63946",fontSize:10,fontWeight:700,letterSpacing:3,fontFamily:"'JetBrains Mono'" }}>🎭 PANNEAU ANIMATEUR</div>
              <div style={{ color:t.text,fontSize:16,fontWeight:700,display:"flex",alignItems:"center",gap:8 }}>
                Opération BRUMATOR
                <span style={{ fontSize:10,padding:"2px 8px",borderRadius:4,fontFamily:"'JetBrains Mono'",
                  background:demoMode?"rgba(255,255,255,0.05)":"rgba(46,204,113,0.15)",
                  color:demoMode?"#6c757d":"#2ecc71",fontWeight:500 }}>
                  {demoMode?"DÉMO LOCAL":`🟢 ${sessionCode} — ${playersOnline.length} en ligne`}
                </span>
              </div>
            </div>
          </div>
          <div style={{ display:"flex",alignItems:"center",gap:10,flexWrap:"wrap" }}>
            <Timer seconds={timer} running={timerRunning} theme={theme}/>
            <button onClick={()=>{
              const newState = !timerRunning;
              setTimerRunning(newState);
              syncSessionState({ timer_running: newState, timer_seconds: timer, timer_started_at: newState ? new Date().toISOString() : null });
            }} style={{
              background:timerRunning?"rgba(231,76,60,0.2)":"rgba(46,204,113,0.2)",
              color:timerRunning?"#e74c3c":"#2ecc71",
              border:`1px solid ${timerRunning?"#e74c3c33":"#2ecc7133"}`,
              borderRadius:6,padding:"6px 16px",cursor:"pointer",fontFamily:"'JetBrains Mono'",fontSize:12,fontWeight:600 }}>
              {timerRunning?"⏸ PAUSE":"▶ START"}
            </button>
            <button onClick={()=>{setTimer(5400);setTimerRunning(false);syncSessionState({timer_running:false,timer_seconds:5400,timer_started_at:null});}} style={{
              background:t.bgCard3,color:t.textDim,border:`1px solid ${t.borderStrong}`,
              borderRadius:6,padding:"6px 12px",cursor:"pointer",fontFamily:"'JetBrains Mono'",fontSize:12 }}
              title="Réinitialiser le timer à 90:00">🔄</button>
            <button onClick={()=>setShowResetConfirm(true)} style={{
              background:"rgba(231,76,60,0.08)",color:"#e74c3c",border:"1px solid rgba(231,76,60,0.2)",
              borderRadius:6,padding:"6px 12px",cursor:"pointer",fontFamily:"'JetBrains Mono'",fontSize:11,fontWeight:600 }}>
              🗑 NOUVEAU JEU
            </button>
            <button onClick={()=>{
              if(confirm("🏁 Terminer la session et envoyer tous les participants sur la page de remerciement ?")) {
                syncSessionState({status:"ended", ended_at: new Date().toISOString()});
                addNotification("🏁 Session terminée — les participants voient la page de remerciement", "injection", "facilitator");
              }
            }} style={{

                    </div>

              {/* Breaking news preview */}
              {vigBreaking.length > 0 && (
                <div style={{ marginTop:16,background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:12,padding:16 }}>

                    🔴 BREAKING NEWS — Bandeau défilant V{presseVig}
                  </h4>
                  {vigBreaking.map((brk,i) => (
                    <div key={i} style={{ color:t.textSoft,fontSize:12,padding:"4px 0",borderBottom:`1px solid ${t.border}` }}>
                      {brk}
                    </div>
                  ))}
                </div>
              )}
            </div>
            );

          {facTab === "chat" && (
            <div style={{ display:"flex",flexDirection:"column",height:"calc(100vh - 280px)" }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
                <h3 style={{ color:t.text,fontSize:18,fontWeight:700,margin:0 }}>
                  💬 Communications inter-cellules
                  <span style={{ color:t.textDim,fontSize:12,fontWeight:400,marginLeft:10 }}>{chatMessages.length} messages</span>
                </h3>
              </div>
              {/* Channel selector */}
              <div style={{ display:"flex",gap:4,marginBottom:10,flexWrap:"wrap" }}>
                <button onClick={()=>setFacChatChannel("general")} style={{
                  background:facChatChannel==="general"?"rgba(230,57,70,0.15)":"transparent",
                  color:facChatChannel==="general"?"#fff":"#6c757d",border:`1px solid ${facChatChannel==="general"?"#e63946":"rgba(255,255,255,0.08)"}`,
                  borderRadius:6,padding:"5px 12px",cursor:"pointer",fontFamily:"'Outfit'",fontSize:11,fontWeight:600 }}>
                  🌐 Général
                </button>
                {CELLS.map(c=>(
                  <button key={c.id} onClick={()=>setFacChatChannel(c.id)} style={{
                    background:facChatChannel===c.id?`${c.color}20`:"transparent",
                    color:facChatChannel===c.id?c.color:t.textDim,border:`1px solid ${facChatChannel===c.id?c.color:"rgba(255,255,255,0.08)"}`,

              {/* Messages list */}
              <div style={{ flex:1,overflowY:"auto",marginBottom:10 }}>
                {chatMessages.length === 0 ? (
                  <div style={{ textAlign:"center",padding:60,color:t.textGhost }}>
                    <div style={{ fontSize:48,marginBottom:12,opacity:0.3 }}>💬</div>
                    <div style={{ fontSize:14 }}>Aucune communication pour le moment</div>
                  </div>
                ) : (
                  (() => {
                    const filtered = facChatChannel === "general"
                      ? chatMessages
                      : chatMessages.filter(m => m.channel === "general" || m.from === facChatChannel || m.channel === facChatChannel
                        || (m.channel && m.channel.includes && m.channel.includes(facChatChannel)));
                    return filtered.map(m => {
                      const fromCell = CELLS.find(c=>c.id===m.from);
                      const isAnim = m.from === "animateur";
                      const channelLabel = m.channel==="general" ? "🌐 Général" : (() => {
                        const parts = (m.channel||"").split("-");
                        const other = parts.find(x=>x!==m.from);
                        const otherCell = CELLS.find(c=>c.id===other);
                        return `→ ${otherCell?.icon||""} ${otherCell?.name||other}`;
                      })();
                      return (
                        <div key={m.id} style={{
                          display:"flex",gap:10,padding:"8px 12px",marginBottom:4,
                          background:isAnim?"rgba(230,57,70,0.06)":t.bgCard,borderRadius:8,
                          borderLeft:`3px solid ${isAnim?"#e63946":fromCell?.color||"#6c757d"}`,
                          animation:"slideUp 0.2s ease-out" }}>
                          <div style={{ width:28,height:28,borderRadius:"50%",
                            background:isAnim?"#e6394622":(fromCell?.color||"#333")+"22",
                            display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0 }}>
                            {isAnim?"🎭":fromCell?.icon||"?"}
                          </div>
                          <div style={{ flex:1 }}>
                            <div style={{ display:"flex",gap:6,alignItems:"center",marginBottom:2 }}>
                              <span style={{ color:isAnim?"#e63946":fromCell?.color||"#fff",fontSize:12,fontWeight:600 }}>
                                {isAnim?"Animateur":fromCell?.name||m.from}
                              </span>
                              <span style={{ color:t.textGhost,fontSize:9,fontFamily:"'JetBrains Mono'" }}>{channelLabel}</span>
                              <span style={{ color:t.textGhost,fontSize:9,fontFamily:"'JetBrains Mono'",marginLeft:"auto" }}>{m.time}</span>
                            </div>
                            <div style={{ color:t.textSoft,fontSize:12.5,lineHeight:1.4 }}>{m.text}</div>
                          </div>
                        </div>
                      );
                    });
                  })()

              </div>
              {/* Composer */}
              <div style={{ background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:10,padding:12 }}>

                  <span style={{ color:"#e63946",fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono'" }}>ANIMATEUR</span>

                  <span style={{ color:facChatChannel==="general"?"#fff":CELLS.find(c=>c.id===facChatChannel)?.color||"#fff",
                    fontSize:11,fontWeight:600 }}>
                    {facChatChannel==="general"?"🌐 Toutes les cellules":`${CELLS.find(c=>c.id===facChatChannel)?.icon||""} ${CELLS.find(c=>c.id===facChatChannel)?.name||facChatChannel}`}
                  </span>
                </div>
                <div style={{ display:"flex",gap:8 }}>
                  <input type="text" value={facChatDraft} onChange={e=>setFacChatDraft(e.target.value)}

                    onKeyDown={e=>{
                      if(e.key==="Enter"&&facChatDraft.trim()){
                        sendChatMessage("animateur",facChatChannel==="general"?"general":facChatChannel,facChatDraft);
                        setFacChatDraft("");
                      }

                    style={{ flex:1,background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:8,
                      padding:"10px 14px",color:t.text,fontSize:13,fontFamily:"'Outfit'",outline:"none" }} />
                  <button onClick={()=>{
                    if(facChatDraft.trim()){
                      sendChatMessage("animateur",facChatChannel==="general"?"general":facChatChannel,facChatDraft);
                      setFacChatDraft("");
                    }
                  }} style={{
                    background:"#e63946",color:"#fff",border:"none",borderRadius:8,padding:"10px 18px",
                    cursor:"pointer",fontFamily:"'Outfit'",fontSize:13,fontWeight:700 }}>
                    Envoyer ▸
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Syntheses comparison (facilitator) */}
          {facTab === "syntheses" && (() => {
            const filledCells = CELLS.filter(c => {
              const cs = cellSyntheses[c.id];
              return cs && (cs.confirmed || cs.toVerify || cs.intox || cs.priority1 || cs.decision || cs.enVueDe || cs.jeVeux);
            });
            const emptyCells = CELLS.filter(c => !filledCells.find(f => f.id === c.id));
            const sc = synthSelectedCell ? cellSyntheses[synthSelectedCell] || {} : {};
            const selCell = CELLS.find(c => c.id === synthSelectedCell);

            const handlePrint = () => {
              const content = exportRef.current;
              if (!content) return;
              const printWin = document.createElement("iframe");
              printWin.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:210mm;height:297mm;";
              document.body.appendChild(printWin);
              const pd = printWin.contentDocument;
              pd.open();
              pd.write(`<!DOCTYPE html><html><head><meta charset="utf-8"/><style>
                *{margin:0;padding:0;box-sizing:border-box}
                body{font-family:Arial,sans-serif;padding:20px 30px;font-size:12px;line-height:1.4;color:#222}
                h1{font-size:20px;color:#c0392b;margin-bottom:4px}
                h2{font-size:15px;color:#2c3e50;margin:18px 0 8px;border-bottom:2px solid #e63946;padding-bottom:3px}
                .meta{color:#888;font-size:10px;margin-bottom:16px}
                table{width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:11px}
                th{background:#2c3e50;color:#fff;padding:6px 8px;text-align:left;font-size:10px}
                td{padding:5px 8px;border-bottom:1px solid #ddd;vertical-align:top}
                tr:nth-child(even){background:#f8f8f8}
                .cell-card{border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:12px;page-break-inside:avoid}
                .field{margin-bottom:8px}
                .field-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
                .field-value{font-size:11px;white-space:pre-wrap;padding:4px 8px;background:#f5f5f5;border-radius:3px;border-left:3px solid #ddd}
                .empty{color:#aaa;font-style:italic}
                @media print{body{padding:10px 15px}}
              </style></head><body>${content.innerHTML}</body></html>`);
              pd.close();
              setTimeout(() => { printWin.contentWindow.print(); setTimeout(() => document.body.removeChild(printWin), 1000); }, 400);
            };

            const handleCopyHTML = () => {
              const content = exportRef.current;
              if (!content) return;
              const html = content.innerHTML;
              navigator.clipboard.writeText(html).then(() => alert("✅ HTML copié dans le presse-papier !")).catch(() => {
                const ta = document.createElement("textarea");
                ta.value = html; ta.style.cssText = "position:fixed;top:-9999px";
                document.body.appendChild(ta); ta.select(); document.execCommand("copy");
                document.body.removeChild(ta);
                alert("✅ HTML copié !");
              });
            };

            return (
            <div>
              {/* Header + View mode + Export */}
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8 }}>
                <h3 style={{ color:t.text,fontSize:18,fontWeight:700,margin:0,fontFamily:"'Outfit'" }}>
                  📊 Synthèses — {VIGNETTES[activeVignette-1]?.name}
                  <span style={{ color:t.textDim,fontSize:12,fontWeight:400,marginLeft:10 }}>
                    {filledCells.length}/5 rédigées
                  </span>
                </h3>
                <div style={{ display:"flex",gap:6,alignItems:"center" }}>
                  <button onClick={()=>setSynthExportView(true)} style={{
                    background:"rgba(46,204,113,0.1)",color:"#2ecc71",border:"1px solid #2ecc7133",
                    borderRadius:6,padding:"5px 10px",cursor:"pointer",fontFamily:"'JetBrains Mono'",fontSize:10,fontWeight:600 }}>
                    📊 Exporter / Imprimer
                  </button>
                  <div style={{ display:"flex",background:t.bgCard2,borderRadius:8,overflow:"hidden",
                    border:`1px solid ${t.borderMed}` }}>
                    <button onClick={()=>{setSynthViewMode("compare");setSynthSelectedCell(null);}} style={{
                      background:synthViewMode==="compare"?"rgba(230,57,70,0.15)":"transparent",
                      color:synthViewMode==="compare"?"#fff":"#6c757d",border:"none",
                      padding:"6px 14px",cursor:"pointer",fontFamily:"'Outfit'",fontSize:12,fontWeight:500 }}>
                      Vue comparée
                    </button>
                    <button onClick={()=>setSynthViewMode("cell")} style={{
                      background:synthViewMode==="cell"?"rgba(230,57,70,0.15)":"transparent",
                      color:synthViewMode==="cell"?"#fff":"#6c757d",border:"none",
                      padding:"6px 14px",cursor:"pointer",fontFamily:"'Outfit'",fontSize:12,fontWeight:500 }}>
                      Par cellule
                    </button>
                    <button onClick={()=>setSynthViewMode("eval")} style={{
                      background:synthViewMode==="eval"?"rgba(46,204,113,0.15)":"transparent",
                      color:synthViewMode==="eval"?"#2ecc71":"#6c757d",border:"none",
                      padding:"6px 14px",cursor:"pointer",fontFamily:"'Outfit'",fontSize:12,fontWeight:500 }}>
                      📈 Évaluation
                    </button>
                  </div>
                </div>
              </div>

              {/* Cell selector bar */}
              <div className="ifa-grid-cells" style={{ display:"flex",gap:6,marginBottom:16,flexWrap:"wrap" }}>
                {CELLS.map(c => {
                  const cs = cellSyntheses[c.id] || {};
                  const hasFilled = cs.confirmed || cs.toVerify || cs.intox || cs.priority1 || cs.decision || cs.enVueDe;
                  const isSelected = synthSelectedCell === c.id;
                  return (
                    <button key={c.id} onClick={()=>{setSynthSelectedCell(c.id);setSynthViewMode("cell");}}
                      style={{
                        background:isSelected?`${c.color}20`:"rgba(255,255,255,0.02)",
                        border:`1px solid ${isSelected?c.color:"rgba(255,255,255,0.08)"}`,
                        borderRadius:10,padding:"10px 14px",cursor:"pointer",
                        fontFamily:"'Outfit'",fontSize:12,textAlign:"left",
                        flex:"1 1 160px",minWidth:160,transition:"all 0.2s",
                        position:"relative",overflow:"hidden"
                      }}
                      onMouseOver={e=>{ if(!isSelected) e.currentTarget.style.borderColor=c.color+"66"; }}
                      onMouseOut={e=>{ if(!isSelected) e.currentTarget.style.borderColor="rgba(255,255,255,0.08)"; }}>
                      <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                        <span style={{ fontSize:18 }}>{c.icon}</span>
                        <div>
                          <div style={{ color:isSelected?"#fff":"#d4d4d4",fontWeight:600,fontSize:13 }}>{c.name}</div>
                          <div style={{ display:"flex",alignItems:"center",gap:4,marginTop:2 }}>
                            <span style={{ width:6,height:6,borderRadius:"50%",
                              background:hasFilled?"#2ecc71":"#555",boxShadow:hasFilled?"0 0 4px #2ecc71":"none" }}/>
                            <span style={{ color:hasFilled?"#2ecc71":"#555",fontSize:9,fontFamily:"'JetBrains Mono'" }}>
                              {hasFilled?"Synthèse rédigée":"En attente"}

                          </div>
                        </div>
                      </div>
                      {/* Completion indicator */}
                      {hasFilled && (
                        <div style={{ position:"absolute",top:0,right:0,width:20,height:20,
                          background:c.color,borderRadius:"0 10px 0 10px",display:"flex",

                  <div style={{ color:t.text,fontSize:13,fontWeight:700,fontFamily:"'Outfit'" }}>
                    🎬 Révélation progressive
                  </div>
                  <div style={{ display:"flex",gap:6 }}>
                    <button onClick={()=>changeSynthPhase(0)} style={{
                      background:synthPhase===0?"rgba(255,255,255,0.1)":"transparent",color:t.textDim,
                      border:`1px solid ${t.borderMed}`,borderRadius:6,padding:"4px 10px",
                      cursor:"pointer",fontSize:10,fontFamily:"'JetBrains Mono'" }}>
                      Tout masquer
                    </button>
                    <button onClick={()=>changeSynthPhase(5)} style={{
                      background:"rgba(46,204,113,0.1)",color:"#2ecc71",
                      border:"1px solid #2ecc7133",borderRadius:6,padding:"4px 10px",
                      cursor:"pointer",fontSize:10,fontFamily:"'JetBrains Mono'" }}>
                      Tout révéler
                    </button>
                  </div>
                </div>
                <div className="ifa-phase-stepper" style={{ display:"flex",gap:4,flexWrap:"wrap" }}>
                  {[
                    { phase:1, label:"Phase 1", desc:"Classification", icon:"📋", color:"#2ecc71" },
                    { phase:2, label:"Phase 2", desc:"3 Priorités", icon:"🎯", color:"#e9c46a" },
                    { phase:3, label:"Phase 3", desc:"Intention", icon:"⚡", color:"#e63946" },
                    { phase:4, label:"Phase 4", desc:"Décision", icon:"✅", color:"#1d9bf0" },
                    { phase:5, label:"Phase 5", desc:"Retex", icon:"💬", color:"#9b59b6" },
                  ].map((p, i) => {
                    const isActive = synthPhase >= p.phase;
                    const isCurrent = synthPhase === p.phase;
                    return (
                      <button key={p.phase} onClick={()=>changeSynthPhase(p.phase)}
                        style={{
                          flex:1,background:isActive?`${p.color}15`:t.bgCard2,
                          border:`2px solid ${isCurrent?p.color:isActive?p.color+"44":t.border}`,
                          borderRadius:10,padding:"10px 8px",cursor:"pointer",
                          transition:"all 0.3s",position:"relative",overflow:"hidden",
                          textAlign:"center",
                        }}>
                        {/* Progress connector */}
                        {i > 0 && (
                          <div style={{ position:"absolute",left:-2,top:"50%",width:4,height:2,
                            background:isActive?p.color:t.textGhost }} />
                        )}
                        <div style={{ fontSize:18,marginBottom:2 }}>{p.icon}</div>
                        <div style={{ color:isActive?t.text:t.textDim,fontSize:10,fontWeight:700,
                          fontFamily:"'JetBrains Mono'",letterSpacing:0.5 }}>
                          {p.label}
                        </div>
                        <div style={{ color:isActive?p.color:t.textGhost,fontSize:10,fontFamily:"'Outfit'",marginTop:2 }}>
                          {p.desc}
                        </div>
                        {isCurrent && (
                          <div style={{ position:"absolute",bottom:0,left:"20%",right:"20%",height:3,
                            borderRadius:"3px 3px 0 0",background:p.color,
                            boxShadow:`0 0 8px ${p.color}` }} />
                        )}
                      </button>
                    );
                  })}
                </div>
                {synthPhase === 0 && (
                  <div style={{ textAlign:"center",marginTop:10,color:t.textDim,fontSize:11,fontStyle:"italic" }}>
                    Cliquez sur une phase pour révéler progressivement les synthèses des cellules
                  </div>
                )}
              </div>

              {/* ============ COMPARE VIEW ============ */}
              {synthViewMode === "compare" && (
                <div>
                  {/* Phase 0 waiting state */}
                  {synthPhase === 0 && (
                    <div style={{ textAlign:"center",padding:60,color:t.textGhost }}>
                      <div style={{ fontSize:56,marginBottom:16,opacity:0.25 }}>📊</div>
                      <div style={{ fontSize:16,fontWeight:600,color:t.textDim,marginBottom:8 }}>Synthèses en attente de révélation</div>
                      <div style={{ fontSize:12,color:t.textDim,maxWidth:400,margin:"0 auto",lineHeight:1.6 }}>
                        Les cellules rédigent leurs synthèses. Utilisez le sélecteur de phases ci-dessus pour révéler progressivement les résultats à l'ensemble du groupe.
                      </div>
                      <button onClick={()=>changeSynthPhase(1)} style={{
                        marginTop:20,background:"linear-gradient(135deg,#2ecc71,#27ae60)",color:"#fff",border:"none",
                        borderRadius:8,padding:"10px 28px",fontSize:14,fontWeight:700,cursor:"pointer",
                        fontFamily:"'Outfit'",boxShadow:"0 4px 20px rgba(46,204,113,0.3)" }}>
                        📋 Révéler Phase 1 — Classification ▸
                      </button>
                    </div>
                  )}

                  {/* Progress bar (visible from phase 1+) */}
                  {synthPhase >= 1 && (
                    <div style={{ background:t.bgCard3,borderRadius:6,height:6,marginBottom:20,overflow:"hidden" }}>
                      <div style={{ width:`${(filledCells.length/5)*100}%`,height:"100%",
                        background:"linear-gradient(90deg,#2ecc71,#e9c46a)",borderRadius:6,transition:"width 0.5s" }}/>
                    </div>
                  )}

                  {/* PHASE 1 — CLASSIFICATION COMPARISON */}
                  {synthPhase >= 1 && (
                  <div style={{ background:t.bgCard,border:`1px solid ${t.border}`,
                    borderRadius:12,padding:16,marginBottom:16,animation:"slideUp 0.4s ease-out" }}>
                    <h4 style={{ color:t.text,fontSize:14,fontWeight:700,margin:"0 0 12px",fontFamily:"'JetBrains Mono'",display:"flex",alignItems:"center",gap:8 }}>
                      <span style={{ background:"#2ecc7122",color:"#2ecc71",fontSize:9,padding:"2px 8px",borderRadius:4 }}>PHASE 1</span>
                      CLASSIFICATION DES INFORMATIONS
                    </h4>
                    <div className="ifa-grid-3" style={{ display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:12 }}>
                      {[{l:"CONFIRMÉ",c:"#2ecc71",i:"✓",field:"confirmed"},{l:"À VÉRIFIER",c:"#f39c12",i:"?",field:"toVerify"},{l:"PROBABLE INTOX",c:"#e74c3c",i:"✗",field:"intox"}].map(cat=>(
                        <div key={cat.l} style={{ background:`${cat.c}06`,border:`1px solid ${cat.c}22`,borderRadius:10,padding:12 }}>
                          <div style={{ color:cat.c,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono'",marginBottom:10 }}>{cat.i} {cat.l}</div>
                          {CELLS.map(c => {
                            const val = cellSyntheses[c.id]?.[cat.field] || "";
                            return (

                      {/* Intention — Phase 3 */}

                        </div>

                      {/* Decision — Phase 4 */}
                      {synthPhase >= 4 ? (

                          DÉCISIONS / PROPOSITIONS
                        </h4>
                        {[
                          {label:"Analyse synthétique (cohérence / incohérence)",field:"analyseSynth",color:"#e9c46a"},

                        <div style={{ background:t.bgCard,border:"1px dashed rgba(255,255,255,0.08)",

                          const next = idx < CELLS.length-1 ? CELLS[idx+1] : null;

                            <>
                              {prev ? (
                                <button onClick={()=>setSynthSelectedCell(prev.id)} style={{
                                  background:t.bgCard2,color:t.textMuted,border:`1px solid ${t.borderMed}`,

                                <button onClick={()=>setSynthSelectedCell(next.id)} style={{
                                  background:t.bgCard2,color:t.textMuted,border:`1px solid ${t.borderMed}`,
                                  borderRadius:8,padding:"8px 16px",cursor:"pointer",fontFamily:"'Outfit'",fontSize:12,
                                  display:"flex",alignItems:"center",gap:6 }}>
                                  {next.icon} {next.name} →
                                </button>
                              ) : <div/>}
                            </>
                          );
                        })()}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Evaluation view */}
              {synthViewMode === "eval" && (() => {
                const phases = [
                  { id: 1, name: "Classification", fields: ["confirmed","toVerify","intox"] },
                  { id: 2, name: "Priorités", fields: ["priority1","priority2","priority3"] },
                  { id: 3, name: "Intention", fields: ["enVueDe","jeVeux","aCetEffet"] },
                  { id: 4, name: "Décision", fields: ["decision","analyseSynth","precoCoord","actionsAnticiper"] },
                  { id: 5, name: "Retex", fields: ["retex"] },
                ];
                const totalFields = phases.reduce((a,p) => a + p.fields.length, 0);

                const evalData = CELLS.map(c => {
                  const cs = cellSyntheses[c.id] || {};
                  const phaseData = phases.map(p => {
                    const filled = p.fields.filter(f => cs[f] && cs[f].trim().length > 0).length;
                    const volume = p.fields.reduce((a,f) => a + (cs[f]||"").length, 0);
                    return { ...p, filled, total: p.fields.length, pct: Math.round(filled/p.fields.length*100), volume };
                  });
                  const totalFilled = phaseData.reduce((a,p) => a + p.filled, 0);
                  const totalVolume = phaseData.reduce((a,p) => a + p.volume, 0);
                  const globalPct = Math.round(totalFilled/totalFields*100);
                  return { cell: c, phaseData, totalFilled, totalVolume, globalPct };
                });

                const sortedByPct = [...evalData].sort((a,b) => b.globalPct - a.globalPct);
                const avgPct = Math.round(evalData.reduce((a,e) => a + e.globalPct, 0) / evalData.length);
                const avgVolume = Math.round(evalData.reduce((a,e) => a + e.totalVolume, 0) / evalData.length);
                const pctColor = (v) => v >= 80 ? "#2ecc71" : v >= 50 ? "#e9c46a" : v >= 20 ? "#e67e22" : "#e74c3c";

                return (
                <div>
                  {/* Global summary */}
                  <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20 }}>

                        }} style={{
                          background:t.bgCard3,color:t.textMuted,border:`1px solid ${t.borderStrong}`,
                          borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:600,
                          fontFamily:"'JetBrains Mono'",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s" }}
                          onMouseOver={e=>{e.target.style.background="rgba(255,255,255,0.1)";e.target.style.color="#fff";}}
                          onMouseOut={e=>{e.target.style.background="rgba(255,255,255,0.05)";e.target.style.color="#adb5bd";}}>

                        </button>
                        <div style={{ display:"flex",alignItems:"center",gap:6,background:`${color}15`,
                          border:`1px solid ${color}33`,borderRadius:8,padding:"8px 16px" }}>

                        </div>
                      </>
                    ) : (
                      <button disabled={pushing} onClick={async () => {
                        setPushing(true);
                        setPushError(null);
                        const result = await pushSynthToSupabase();
                        if (result && result.error) {
                          setPushError(result.error);
                          setPushing(false);
                        } else {
                          setValidatedPhases(prev => ({...prev, [vKey]: true}));

                      }} style={{
                        background: pushing ? "#6c757d" : `linear-gradient(135deg,${color},${color}cc)`,color:t.text,border:"none",
                        borderRadius:8,padding:"10px 24px",cursor: pushing ? "wait" : "pointer",fontSize:13,fontWeight:700,
                        fontFamily:"'Outfit'",boxShadow:`0 3px 12px ${color}44`,transition:"all 0.2s",
                        display:"flex",alignItems:"center",gap:8 }}

              { phase:4, icon:"✅", label:"Décision", color:"#1d9bf0" },

                    <span style={{ color:t.text,fontSize:13,fontWeight:600 }}>Retex — Témoignages et ressentis</span>

                  <ValidateButton phase={5} color="#9b59b6" />
                </div>
              ) : synthPhase >= 1 && (
                <div style={{ background:t.bgCard,border:"1px dashed rgba(255,255,255,0.08)",
                  borderRadius:8,padding:16,marginTop:16,textAlign:"center",color:t.textGhost,fontSize:12 }}>
                  💬 Retex — phase suivante

  if (screen === "thanks") {

    const totalInj = Object.keys(sentInjections).length;
    const totalChat = chatMessages.length;
    const totalSynth = CELLS.filter(c => {
      const cs = cellSyntheses[c.id];
      return cs && (cs.confirmed || cs.priority1 || cs.decision);
    }).length;
    const vigNames = ["Brouillard", "Priorisation", "Intention", "Gestion de crise"];
    const vigHplus = ["H+0", "H+6", "H+18", "H+36"];

    return (

        {/* Top bar */}
        <div style={{ background:isDk?"#0d1321":"#ffffff",borderBottom:`1px solid ${isDk?"#1a2744":"#e2e8f0"}`,

          </div>

        {/* Scrolling ticker */}
        <div style={{ background:isDk?"#111827":"#e8f0fe",borderBottom:`1px solid ${isDk?"#1a2744":"#d1dce8"}`,

            💉 {totalInj} injections traitées &nbsp;&nbsp;&nbsp;•&nbsp;&nbsp;&nbsp;

              { icon: "🔗", text: "Coordination inter-cellules : quelles frictions ?" },
              { icon: "📰", text: "Intox détectées vs manquées ?" },
            ].map((item, i) => (
              <div key={i} style={{ display:"flex",alignItems:"flex-start",gap:10,
                padding:"10px 0",borderBottom:i < 3 ? `1px solid ${isDk?"#1a2744":"#f1f5f9"}` : "none" }}>
                <span style={{ fontSize:14,flexShrink:0,marginTop:1 }}>{item.icon}</span>
                <span style={{ color:isDk?"#adb5bd":"#475569",fontSize:13,lineHeight:1.5 }}>{item.text}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Footer */}
        <div style={{ textAlign:"center",padding:"20px 24px 40px",animation:"fadeSlideUp 0.8s ease-out 1s both" }}>
          <div style={{ color:isDk?"#333":"#cbd5e1",fontSize:11,fontFamily:"'JetBrains Mono'",letterSpacing:3,
            padding:"10px 24px",border:`1px solid ${isDk?"#1a2744":"#e2e8f0"}`,borderRadius:8,display:"inline-block" }}>
            IFASTORIA — FUTURING LAB — SIMULATION PÉDAGOGIQUE
          </div>
        </div>

        {/* Ticker animation */}
        <style>{`@keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }`}</style>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(IFAstoriaApp));
  </script>
</body>
</html>
